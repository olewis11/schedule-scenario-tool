function normP(pcts) {
  const sum = pcts.reduce((a, b) => a + b, 0);
  if(sum===0)return pcts.map(()=>1/pcts.length);
  return pcts.map(v => v / sum);
}
function mkSt(normalized) {
  const starts = [];
  let cursor = 0;
  normalized.forEach(v => { starts.push(cursor); cursor += v; });
  return starts;
}
function fmtW(weeks) {
  weeks = Math.round(weeks);
  if (weeks >= 52) return (weeks / 52).toFixed(1) + "yr";
  if (weeks >= 8) return Math.round(weeks / 4.33) + "mo";
  return weeks + "wk";
}
function fmtD(d) {
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
}
function fmtDT(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"})
    + " " + d.toLocaleTimeString("en-US", {hour:"numeric", minute:"2-digit"});
}
function toInp(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function frInp(s) {
  const [y, m, day] = (s||"").split("-").map(Number);
  if(!y||!m||!day||isNaN(y)||isNaN(m)||isNaN(day))return today0();
  return new Date(y, m - 1, day);
}

// Assign vertical stacking levels to diamond milestones that would overlap.
// items: [{id,x,label,sub}] — x is a fraction [0,1], sub may be undefined.
// cw: timeline container width in px.
// Returns {[id]: levelIndex} — 0 = default row, 1 = one step down, etc.
function resolveDiamondLevels(items,cw){
  if(!cw||items.length<2)return{};
  const sorted=[...items].sort((a,b)=>a.x-b.x);
  const lvls=[],out={};
  for(const it of sorted){
    const hw=(Math.max((it.label||"").length,(it.sub||"").length)*6.5+10)/2/cw;
    let ok=false;
    for(let l=0;l<lvls.length;l++){
      if(lvls[l].every(e=>Math.abs(it.x-e.x)>hw+e.hw)){lvls[l].push({x:it.x,hw});out[it.id]=l;ok=true;break;}
    }
    if(!ok){lvls.push([{x:it.x,hw}]);out[it.id]=lvls.length-1;}
  }
  return out;
}
// Assign vertical stacking levels to bars that overlap in x-range.
// items: [{id,x1,x2}] — x1,x2 are fractions [0,1].
// Returns {[id]: levelIndex}
function resolveBarLevels(items){
  if(items.length<2)return{};
  const sorted=[...items].sort((a,b)=>a.x1-b.x1);
  const lvls=[],out={};
  for(const it of sorted){
    let ok=false;
    for(let l=0;l<lvls.length;l++){
      if(lvls[l].every(e=>it.x1>=e.x2-0.001||it.x2<=e.x1+0.001)){lvls[l].push({x1:it.x1,x2:it.x2});out[it.id]=l;ok=true;break;}
    }
    if(!ok){lvls.push([{x1:it.x1,x2:it.x2}]);out[it.id]=lvls.length-1;}
  }
  return out;
}

function triggerConfetti(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const cols=['#f5c800','#1e60a5','#27ae60','#e05a5a','#9b59b6','#e67e22','#3498db','#ff69b4'];
  const parts=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height*0.4-canvas.height*0.2,
    r:Math.random()*5+3,vx:Math.random()*4-2,vy:Math.random()*3+1,
    tilt:Math.random()*10-5,ts:Math.random()*0.12+0.04,ta:0,
    color:cols[Math.floor(Math.random()*cols.length)]
  }));
  let frame=0;const max=200;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const alpha=Math.max(0,1-Math.pow(frame/max,2));
    parts.forEach(p=>{
      ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=p.color;
      ctx.translate(p.x,p.y);ctx.rotate(p.ta);
      ctx.fillRect(-p.r/2,-p.r,p.r,p.r*2);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.ta+=p.ts;
    });
    frame++;
    if(frame<max)requestAnimationFrame(draw);else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function getTicks(start, end, gran) {
  const ms = end - start;
  if (ms <= 0) return [];
  const ticks = [];
  const totalMonths = Math.round(ms / (30.44 * 864e5));
  let cursor, safe, x;

  if (gran === "yearly") {
    cursor = new Date(start.getFullYear(), 0, 1);
    if (cursor < start) cursor = new Date(cursor.getFullYear() + 1, 0, 1);
    for (safe = 0; cursor <= end && safe < 300; safe++) {
      x = (cursor - start) / ms;
      if (x >= 0 && x <= 1) ticks.push({x, label: String(cursor.getFullYear()), major: true});
      cursor = new Date(cursor.getFullYear() + 1, 0, 1);
    }
    return ticks;
  }

  if (gran === "quarterly") {
    const startQ = Math.floor(start.getMonth() / 3) * 3;
    cursor = new Date(start.getFullYear(), startQ, 1);
    if (cursor < start) cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 3, 1);
    for (safe = 0; cursor <= end && safe < 300; safe++) {
      x = (cursor - start) / ms;
      if (x >= 0 && x <= 1) {
        const qNum = Math.floor(cursor.getMonth() / 3) + 1;
        const lbl = qNum === 1 ? "Q1 '" + String(cursor.getFullYear()).slice(2) : "Q" + qNum;
        ticks.push({x, label: lbl, major: cursor.getMonth() === 0});
      }
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 3, 1);
    }
    return ticks;
  }

  // Monthly — always label every month
  cursor = new Date(start.getFullYear(), start.getMonth(), 1);
  if (cursor < start) cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  for (safe = 0, x = 0; cursor <= end && safe < 300; safe++) {
    const frac = (cursor - start) / ms;
    if (frac >= 0 && frac <= 1) {
      const isMajor = cursor.getMonth() === 0;
      const lbl = isMajor
        ? MO[0] + " '" + String(cursor.getFullYear()).slice(2)
        : MO[cursor.getMonth()];
      ticks.push({x: frac, label: lbl, major: isMajor});
    }
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }
  return ticks;
}

function exportCSVFull(snap,mode,gran,startDate,sopDate,launchEndDate,sustainEndDate,devDays,n,devPhaseStart,devPhaseEnd,devPhaseDate,dbList,trVisible,trPos,launchWeeks,sustainWeeks,testBars){

  const metaRow=[CSV_META+JSON.stringify(meta),"","","","","",""];
  const rows=[["Task Name","Start Date","End Date","Duration (days)","% Complete","Predecessors","Notes"]];
  PHASES.forEach((ph,i)=>rows.push([`Ph${i} – ${ph.name}`,fmt(devPhaseStart(i)),fmt(devPhaseEnd(i)),Math.round(n[i]*devDays),"","",ph.desc]));
  n.forEach((_,i)=>{const gd=devPhaseDate(i,1);rows.push([i===6?"G6 – SOP":i===5?"G5 – Model Fix":`G${i} – ${GATE_DESC[i]}`,fmt(gd),fmt(gd),0,"","",GATE_DESC[i]]);});
  DEFAULT_TR.forEach((tr,i)=>{if(!trVisible[i])return;const d=devPhaseDate(tr.phase,trPos[i]);rows.push([`${tr.id} – ${tr.desc}`,fmt(d),fmt(d),0,"","",tr.desc]);});
  dbList.forEach(b=>{const siblings=dbList.filter(x=>x.family===b.family).length;const lbl=buildLabel(b.family,b.seq,siblings);const ds=devPhaseDate(b.phase,b.s),de=devPhaseDate(b.phase,b.e);rows.push([lbl,fmt(ds),fmt(de),Math.round((de-ds)/864e5),"","","Robot Build"]);});
  testBars.forEach(b=>{const ds=devPhaseDate(b.phase,b.s),de=devPhaseDate(b.phase,b.e);rows.push([b.id,fmt(ds),fmt(de),Math.round((de-ds)/864e5),"","","Testing"]);});
  rows.push(["Ph7 – Launch",fmt(sopDate),fmt(launchEndDate),launchWeeks*7,"","","LRIP, GA, scale production ramp"]);
  rows.push(["Ph8 – Sustain",fmt(launchEndDate),fmt(sustainEndDate),sustainWeeks*7,"","","Full-rate production"]);
  const all=[metaRow,...rows];
  const csv=all.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="pdp_timeline.csv";a.click();URL.revokeObjectURL(url);
}

function importCSV(text,initSnap){
  const lines=text.trim().split(/\r?\n/);if(!lines.length)return null;
  function pf(line){const f=[];let cur="",inQ=false;for(let j=0;j<line.length;j++){const ch=line[j];if(ch==='"'){if(inQ&&line[j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}else if(ch===','&&!inQ){f.push(cur);cur="";}else cur+=ch;}f.push(cur);return f;}
  const ff=pf(lines[0]);
  if((ff[0]||"").startsWith(CSV_META)){
    try{
      const meta=JSON.parse((ff[0]||"").slice(CSV_META.length));
      const s=meta.snap;
      return{snap:{pcts:Array.isArray(s.pcts)&&s.pcts.length===PHASES.length?s.pcts:[...DEFAULT_PCTS],trPos:s.trPos||DEFAULT_TR.map(r=>r.pos),trVisible:s.trVisible||DEFAULT_TR.map(()=>true),dbList:Array.isArray(s.dbList)?s.dbList:makeDefaultDbList(),testBars:Array.isArray(s.testBars)?s.testBars:[],anchor:frInp(s.anchor),durDays:s.durDays||Math.round(365.25*2),launchWeeks:s.launchWeeks||DEFAULT_LAUNCH_WK,sustainWeeks:s.sustainWeeks||DEFAULT_SUSTAIN_WK,completed:s.completed||{}},mode:meta.mode,gran:meta.gran};
    }catch{}
  }
  const header=lines[0].replace(/^\uFEFF/,"");
  const cols=header.split(",").map(c=>c.replace(/^"|"$/g,"").trim());
  const ni=cols.findIndex(c=>/task.?name/i.test(c)),si=cols.findIndex(c=>/start.?date/i.test(c)),ei=cols.findIndex(c=>/end.?date/i.test(c));
  if(ni<0||si<0||ei<0)return null;
  const rows=[];
  for(let i=1;i<lines.length;i++){const line=lines[i];if(!line.trim())continue;const fields=pf(line);const name=(fields[ni]||"").trim(),ss=(fields[si]||"").trim(),es=(fields[ei]||"").trim();if(!name||!ss)continue;const start=new Date(ss),end=es?new Date(es):start;if(isNaN(start))continue;rows.push({name,start,end:isNaN(end)?start:end});}
  if(!rows.length)return null;
  const pr=PHASES.map((_,i)=>rows.find(r=>new RegExp(`Ph${i}[\\s–-]`,"i").test(r.name)));
  const ph0=pr[0],ph6=pr[6];if(!ph0||!ph6)return null;
  const startDate=ph0.start,sopDate=addD(ph6.end,1);
  const durDays=Math.max(7,Math.round((sopDate-startDate)/864e5));
  let pcts=[...DEFAULT_PCTS];
  if(pr.every(Boolean)){const rd=pr.map(r=>Math.max(1,Math.round((r.end-r.start)/864e5)+1));const total=rd.reduce((a,b)=>a+b,0);pcts=rd.map(d=>d/total);}
  const lr=rows.find(r=>/Ph7|Launch/i.test(r.name)),sr=rows.find(r=>/Ph8|Sustain/i.test(r.name));
  return{snap:{...initSnap,pcts,anchor:startDate,durDays,launchWeeks:lr?Math.max(4,Math.round((lr.end-lr.start)/864e5/7)):DEFAULT_LAUNCH_WK,sustainWeeks:sr?Math.max(4,Math.round((sr.end-sr.start)/864e5/7)):DEFAULT_SUSTAIN_WK},mode:"forward",gran:"quarterly"};
}

function useUndoable(initial){
  const[idx,setIdx]=useState(0);
  const[,setTick]=useState(0);
  const history=useRef([initial]);
  const current=history.current[idx];
  const push=useCallback(ns=>{history.current=history.current.slice(0,idx+1);history.current.push(ns);if(history.current.length>MAX_HISTORY+1)history.current.shift();setIdx(history.current.length-1);setTick(t=>t+1);},[idx]);
  const undo=useCallback(()=>{if(idx>0)setIdx(i=>i-1);},[idx]);
  const redo=useCallback(()=>{if(idx<history.current.length-1)setIdx(i=>i+1);},[idx]);
  return{current,push,undo,redo,canUndo:idx>0,canRedo:idx<history.current.length-1};
}

// Bug report modal
function BugModal({t,isDark,onClose}){
  const[text,setText]=useState("");
  function submit(){
    if(!text.trim())return;
    const subject=encodeURIComponent("Project Timeline Tool Bug Report");
    const body=encodeURIComponent(text.trim());
    window.open(`mailto:oliver.majer.lewis+git@gmail.com?subject=${subject}&body=${body}`);
    onClose();
  }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:t.panel,border:"1px solid "+t.border,borderRadius:10,padding:28,width:480,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
        <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          <BugIcon sz={18} c={t.textMuted}/> Report a Bug
        </div>
        <div style={{fontSize:13,color:t.textMuted,marginBottom:14}}>Describe the issue and your expected behavior. Clicking Submit will open your email client with this report addressed to the dev team.</div>
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder="Describe what happened, what you expected, and steps to reproduce…"
          style={{width:"100%",height:140,background:t.inBg,border:"1px solid "+t.inBorder,color:t.inText,borderRadius:6,padding:"8px 10px",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
          <button onClick={onClose} style={{padding:"6px 16px",borderRadius:5,border:"1px solid "+t.border,cursor:"pointer",fontSize:13,fontWeight:600,background:t.btnBg,color:t.btnText}}>Cancel</button>
          <button onClick={submit} disabled={!text.trim()} style={{padding:"6px 16px",borderRadius:5,border:"none",cursor:text.trim()?"pointer":"not-allowed",fontSize:13,fontWeight:700,background:t.btnAct,color:"#fff",opacity:text.trim()?1:0.5}}>Submit via Email</button>
        </div>
      </div>
    </div>
  );
}

// Phase hover tooltip
const TT_W=268;
function PhaseTooltip({phase,idx,startDate,endDate,pct,devDays,t,completed,hasOptions,anchorRect}){
  const posStyle=anchorRect?(()=>{
    const left=Math.max(8,Math.min(anchorRect.left+anchorRect.width/2-TT_W/2,window.innerWidth-TT_W-8));
    const top=window.innerHeight-(anchorRect.bottom+8)>155?anchorRect.bottom+6:anchorRect.top-160;
    return{position:"fixed",top,left,zIndex:2000};
  })():{position:"absolute",top:"110%",left:"50%",transform:"translateX(-50%)",zIndex:200};
  const content=(
    <div style={{...posStyle,background:t.ttBg,border:"1px solid "+t.ttBorder,borderRadius:7,padding:"10px 13px",pointerEvents:"none",boxShadow:"0 6px 20px rgba(0,0,0,0.28)",width:TT_W}}>
      <div style={{fontWeight:800,marginBottom:4,fontSize:14,display:"flex",alignItems:"center",gap:7,color:t.text,whiteSpace:"nowrap"}}>
        <span style={{display:"inline-block",width:10,height:10,backgroundColor:phase.color,borderRadius:2,flexShrink:0}}/>
        Ph{idx}: {phase.name}
      </div>
      <div style={{fontSize:12,color:t.textMuted,marginBottom:2,whiteSpace:"nowrap"}}>{fmtD(startDate)} → {fmtD(endDate)}</div>
      <div style={{fontSize:12,color:t.textMuted,marginBottom:4,whiteSpace:"nowrap"}}>{fmtW(Math.round(pct*devDays/7))} &nbsp;·&nbsp; {(pct*100).toFixed(1)}% of dev</div>
      <div style={{fontSize:12,color:t.textDim,lineHeight:1.5,whiteSpace:"normal"}}>{phase.desc}</div>
      {hasOptions&&<div style={{fontSize:10,color:t.textDim,marginTop:6,fontStyle:"italic"}}>Right-click for options</div>}
    </div>
  );
  return anchorRect?ReactDOM.createPortal(content,document.body):content;
}

// Diamond
function Diamond({x,label,sub,color,sz=12,tc,sc,date,desc,t,onDragStart,onDelete,completed,onToggleComplete,onRename,topOffset=0}){
  const[hov,setHov]=useState(false);const timer=useRef(null);const showTimer=useRef(null);
  const elemRef=useRef(null);
  const renameInputRef=useRef(null);
  const[menuPos,setMenuPos]=useState(null);
  const[renameAnchor,setRenameAnchor]=useState(null);
  const[renaming,setRenaming]=useState(false);const[renameVal,setRenameVal]=useState("");
  function enter(){clearTimeout(timer.current);clearTimeout(showTimer.current);showTimer.current=setTimeout(()=>setHov(true),350);}
  function leave(){clearTimeout(showTimer.current);timer.current=setTimeout(()=>setHov(false),150);}
  useEffect(()=>()=>{clearTimeout(timer.current);clearTimeout(showTimer.current);},[]);
  useEffect(()=>{if(renaming)setTimeout(()=>{if(renameInputRef.current){renameInputRef.current.focus();renameInputRef.current.select();}},0);},[renaming]);
  // Safety net: mouseleave can be missed on fast moves, re-renders, or after portals intercept the cursor.
  // Watch mousemove while hovered and clear hov the moment the cursor leaves this subtree.
  useEffect(()=>{
    if(!hov)return;
    function check(e){
      if(!elemRef.current)return;
      const under=document.elementFromPoint(e.clientX,e.clientY);
      if(!under||!elemRef.current.contains(under)){clearTimeout(showTimer.current);setHov(false);}
    }
    document.addEventListener('mousemove',check);
    return()=>document.removeEventListener('mousemove',check);
  },[hov]);
  const d=sz*1.6,pts=(d/2)+",1 "+(d-1)+","+(d/2)+" "+(d/2)+","+(d-1)+" 1,"+(d/2);
  const hasActions=onRename||onDelete||onToggleComplete;
  const mItem=(danger)=>({fontSize:12,color:danger?"#e05a5a":t.text,cursor:"pointer",padding:"6px 14px",background:"transparent",border:"none",textAlign:"left",width:"100%",display:"block",whiteSpace:"nowrap",fontWeight:danger?700:500});
  return(
    <div ref={elemRef} onDoubleClick={e=>e.stopPropagation()}
         onContextMenu={hasActions?e=>{e.preventDefault();e.stopPropagation();setMenuPos({x:e.clientX,y:e.clientY});}:undefined}
         style={{position:"absolute",left:pc(x),transform:"translateX(-50%)",display:"inline-flex",flexDirection:"column",alignItems:"center",top:18+topOffset,transition:"top 0.15s",zIndex:hov||menuPos||renaming?60:5,cursor:onDragStart?"ew-resize":"default"}}
         onMouseEnter={enter} onMouseLeave={leave} onMouseDown={onDragStart}>
      {hov&&date&&!menuPos&&!renaming&&(
        <div onMouseEnter={enter} onMouseLeave={leave} style={{position:"absolute",bottom:"100%",left:"50%",transform:"translateX(-50%)",paddingBottom:10,zIndex:300,pointerEvents:"all",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{background:t.ttBg,border:"1px solid "+t.ttBorder,borderRadius:6,padding:"7px 11px",whiteSpace:"nowrap",boxShadow:"0 4px 16px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:13,fontWeight:800,color:t.text,marginBottom:3,display:"flex",alignItems:"center",gap:6}}>
              <svg width={10} height={10} viewBox="0 0 10 10"><polygon points="5,0.5 9.5,5 5,9.5 0.5,5" fill={color}/></svg>
              {label}{sub&&<span style={{fontWeight:500,color:t.textMuted}}>· {sub}</span>}
            </div>
            {desc&&<div style={{fontSize:12,color:t.textMuted,marginBottom:4}}>{desc}</div>}
            <div style={{fontSize:13,fontWeight:700,color:t.text,borderTop:"1px solid "+t.border,paddingTop:4,marginTop:2}}>📅 {fmtD(date)}</div>
            {hasActions&&<div style={{fontSize:10,color:t.textDim,marginTop:5,fontStyle:"italic"}}>Right-click for options</div>}
          </div>
        </div>
      )}
      {menuPos&&ReactDOM.createPortal(
        <>
          <div style={{position:"fixed",inset:0,zIndex:1998}} onMouseDown={()=>setMenuPos(null)}/>
          <div style={{position:"fixed",left:Math.min(menuPos.x,window.innerWidth-160),top:Math.min(menuPos.y,window.innerHeight-160),zIndex:1999,background:t.panel,border:"1px solid "+t.border,borderRadius:6,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",minWidth:140,padding:"4px 0",overflow:"hidden"}}>
            {onRename&&<button onMouseDown={e=>{e.stopPropagation();setRenameAnchor({x:menuPos.x,y:menuPos.y});setRenameVal(label);setRenaming(true);setMenuPos(null);}} style={mItem()}>✏ Rename</button>}
            {onToggleComplete&&<button onMouseDown={e=>{e.stopPropagation();onToggleComplete();setMenuPos(null);}} style={mItem()}>{completed?"✓ Mark Incomplete":"○ Mark Complete"}</button>}
            {onDelete&&<><div style={{height:1,background:t.border,margin:"4px 0"}}/><button onMouseDown={e=>{e.stopPropagation();onDelete();setMenuPos(null);}} style={mItem(true)}>🗑 Delete</button></>}
          </div>
        </>,
        document.body
      )}
      {renaming&&ReactDOM.createPortal(
        <>
          <div style={{position:"fixed",inset:0,zIndex:1998}} onMouseDown={()=>setRenaming(false)}/>
          <div style={{position:"fixed",left:Math.min((renameAnchor||{x:100}).x,window.innerWidth-240),top:Math.max(10,(renameAnchor||{y:200}).y-110),zIndex:1999,background:t.panel,border:"1px solid "+t.border,borderRadius:7,padding:"12px 14px",boxShadow:"0 6px 24px rgba(0,0,0,0.28)",width:220}} onMouseDown={e=>e.stopPropagation()}>
            <div style={{fontSize:11,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Rename</div>
            <input ref={renameInputRef} value={renameVal} onChange={e=>setRenameVal(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&renameVal.trim()){onRename(renameVal.trim());setRenaming(false);}if(e.key==="Escape")setRenaming(false);}}
              style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:4,border:"1px solid "+t.inBorder,background:t.inBg,color:t.inText,outline:"none",marginBottom:9,boxSizing:"border-box"}}/>
            <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
              <button onMouseDown={()=>setRenaming(false)} style={{padding:"4px 11px",borderRadius:4,border:"1px solid "+t.border,cursor:"pointer",fontSize:12,fontWeight:600,background:t.btnBg,color:t.btnText}}>Cancel</button>
              <button onMouseDown={()=>{if(renameVal.trim()){onRename(renameVal.trim());setRenaming(false);}}} style={{padding:"4px 13px",borderRadius:4,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:t.btnAct,color:"#fff"}}>Save</button>
            </div>
          </div>
        </>,
        document.body
      )}
      <svg width={d} height={d} viewBox={"0 0 "+d+" "+d} overflow="visible" style={{marginTop:4}}>
        <polygon points={pts} fill={color} stroke={hov?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.35)"} strokeWidth={hov?2:1}/>
      </svg>
      <div style={{fontSize:10,color:tc,fontWeight:700,whiteSpace:"nowrap",marginTop:3,textAlign:"center",lineHeight:1.3}}>
        {label}{sub&&<div style={{fontSize:9,color:sc,fontWeight:400}}>{sub}</div>}
      </div>
      {completed&&<div style={{position:"absolute",top:0,right:-8,zIndex:60,width:14,height:14,borderRadius:"50%",background:"#27ae60",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>
        <svg width={9} height={9} viewBox="0 0 9 9"><polyline points="1.5,4.5 3.5,6.5 7.5,2" stroke="#fff" strokeWidth={1.8} fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>}
    </div>
  );
}

// DateInput — uncontrolled date input that:
//   • debounces onChange so month-navigation doesn't fire the handler
//   • uses a ref + editing flag to sync external date changes without remounting (which would close the picker)
//   • commits immediately on blur as a fallback (manual typing / tab away)
function DateInput({date,onCommit,style}){
  const inputRef=useRef(null);
  const editing=useRef(false);
  const timer=useRef(null);
  // Sync external date changes into the DOM without remounting (which would close the picker).
  // Skipped while the user is actively interacting (editing=true).
  useEffect(()=>{
    if(inputRef.current&&!editing.current)inputRef.current.value=toInp(date);
  },[date]);
  useEffect(()=>()=>{clearTimeout(timer.current);},[]);
  return<input ref={inputRef} type="date" defaultValue={toInp(date)}
    onChange={e=>{
      editing.current=true;
      const v=e.target.value;
      clearTimeout(timer.current);
      // Reset editing after debounce so external changes can sync once the picker is closed.
      timer.current=setTimeout(()=>{editing.current=false;if(v)onCommit(v);},400);
    }}
    onBlur={e=>{
      // Blur fires when user tabs away or clicks outside — commit immediately and clear debounce.
      editing.current=false;
      clearTimeout(timer.current);
      if(e.target.value)onCommit(e.target.value);
    }}
    style={style}/>;
}

function ReadOnlyPhaseBlock({ph,i,x1,x2,startDate,endDate,pct,devDays,t}){
  const[hov,setHov]=useState(false);
  const[hovRect,setHovRect]=useState(null);
  const elemRef=useRef(null);
  const timer=useRef(null),showTimer=useRef(null);
  useEffect(()=>()=>{clearTimeout(timer.current);clearTimeout(showTimer.current);},[]);
  function enter(){clearTimeout(timer.current);clearTimeout(showTimer.current);showTimer.current=setTimeout(()=>{if(elemRef.current)setHovRect(elemRef.current.getBoundingClientRect());setHov(true);},300);}
  function leave(){clearTimeout(showTimer.current);timer.current=setTimeout(()=>setHov(false),120);}
  const pc=v=>(v*100).toFixed(3)+"%";
  const w=Math.max(0,x2-x1);
  return(
    <div ref={elemRef} onMouseEnter={enter} onMouseLeave={leave}
      style={{position:"absolute",left:pc(x1),width:pc(w),top:0,bottom:0,backgroundColor:ph.color,

  );
}

            {customGates.map(g=><Diamond key={"cg"+g.key} x={dpp(g.phase,g.pos)} label={g.id} color={GATE_COLOR} sz={11} tc={t.milTx} sc={t.milSub} date={devPhaseDate(g.phase,g.pos)} t={t}/>)}

            {DEFAULT_TR.map((tr,i)=>{if(!trVisible[i])return null;return<Diamond key={tr.id} x={dpp(tr.phase,trPos[i])} label={tr.id} color={TR_COLOR} sz={12} tc={t.milTx} sc={t.milSub} date={devPhaseDate(tr.phase,trPos[i])} desc={tr.desc} t={t} completed={!!(completed["tr-"+tr.id])}/>;})            }
            {customTrs.map(tr=><Diamond key={"ct"+tr.key} x={dpp(tr.phase,tr.pos)} label={tr.id} color={TR_COLOR} sz={12} tc={t.milTx} sc={t.milSub} date={devPhaseDate(tr.phase,tr.pos)} t={t}/>)}

            <span style={rl}>Robot Builds</span>
            {dbList.map(b=>{const x1=dpp(b.phase,b.s),x2=dpp(b.phase,b.e),w=Math.max(0,x2-x1),lbl=b.label||buildLabel(b.family,b.seq,dbList.filter(x=>x.family===b.family).length);
              return<div key={b.key} style={{position:"absolute",left:pc(x1),width:pc(w),top:barPad,height:BUILD_BAR_H,borderRadius:4,backgroundColor:"#b94a08",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",boxShadow:"inset 0 2px 0 rgba(255,255,255,0.14)"}}>
                {w>0.025&&<span style={{fontSize:11,fontWeight:700,color:"#fff",whiteSpace:"nowrap",pointerEvents:"none"}}>{lbl}</span>}

            <span style={rl}>Testing</span>

              return<div key={b.key} style={{position:"absolute",left:pc(x1),width:pc(w),top:barPad,height:BUILD_BAR_H,borderRadius:4,backgroundColor:"#5b6abf",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",boxShadow:"inset 0 2px 0 rgba(255,255,255,0.14)"}}>
                {w>0.025&&<span style={{fontSize:11,fontWeight:700,color:"#fff",whiteSpace:"nowrap",pointerEvents:"none"}}>{b.id}</span>}

function CompareView({selected,compareAlign,setCompareAlign,hiddenRows,toggleRow,todayDate,showTodayLine,toggleTodayLine,t,isDark,onBack,
  scenarios,scenariosLoading,saveError,setSaveError,scenarioName,setScenarioName,onSave,onOverwrite,onRestore,onDelete,onRename,onDuplicate,onRefresh,onPublish,publishedKeys,
  sharedScenarios,sharedLoading,shareError,onUnpublish,onDuplicateShared,onRenameShared,onRefreshShared,currentUser,
  compareIds,onToggleCompare,loadedScenarioKey}){
  const[addOpen,setAddOpen]=useState(false);
  const[exporting,setExporting]=useState(false);
  const captureRef=useRef(null);
  const legendBg=isDark?"rgba(255,255,255,0.03)":"#f0f2f5";
  async function handleExportPNG(){
    if(!captureRef.current||exporting)return;
    setExporting(true);
    try{
      const bg=isDark?"#0b1220":"#ffffff";
      const canvas=await html2canvas(captureRef.current,{backgroundColor:bg,scale:2,useCORS:true,logging:false});
      const url=padCanvas(canvas,bg).toDataURL("image/png");
      const a=document.createElement("a");a.href=url;a.download="compare_scenarios.png";a.click();
    }catch(err){alert("PNG export failed: "+err.message);}
    finally{setExporting(false);}
  }
  const scData=useMemo(()=>selected.map(sc=>{
    const pcts=Array.isArray(sc.pcts)&&sc.pcts.length===PHASES.length?sc.pcts:[...DEFAULT_PCTS];
    const n=normP(pcts),st=mkSt(n);
    const devDays=Math.max(7,Number(sc.durDays)||365);
    const mode=sc.mode||"forward";
    const anchor=new Date(sc.anchor);
    const startDate=mode==="backward"?addD(anchor,-devDays):anchor;
    const sopDate=addD(startDate,devDays);
    const launchWeeks=sc.launchWeeks||DEFAULT_LAUNCH_WK;
    const sustainWeeks=sc.sustainWeeks||DEFAULT_SUSTAIN_WK;
    const launchDays=launchWeeks*7;
    const sustainDays=sustainWeeks*7;
    const postDays=launchDays+sustainDays;
    const displayEndDate=addD(sopDate,postDays);
    const displayDays=devDays+postDays;
    return{sc,n,st,devDays,startDate,sopDate,launchDays,sustainDays,postDays,displayEndDate,displayDays};
  }),[selected]);
  const axis=useMemo(()=>{
    if(!scData.length)return{sharedDuration:365,getXFrac:()=>0,getTickRange:d=>[d.startDate,d.displayEndDate]};
    if(compareAlign==="date"){
      const s0=new Date(Math.min(...scData.map(d=>d.startDate.getTime())));
      const s1=new Date(Math.max(...scData.map(d=>d.displayEndDate.getTime())));
      const dur=Math.max(1,(s1-s0)/864e5);
      return{sharedDuration:dur,getXFrac:(date)=>(new Date(date)-s0)/(dur*864e5),getTickRange:()=>[s0,s1]};
    }
    if(compareAlign==="start"){
      const dur=Math.max(1,...scData.map(d=>d.displayDays));
      const ref=new Date(2024,0,1);
      const sharedTickRange=[ref,addD(ref,dur)];
      return{sharedDuration:dur,getXFrac:(date,d)=>(new Date(date)-d.startDate)/(dur*864e5),getTickRange:d=>[d.startDate,addD(d.startDate,dur)],sharedTickRange};
    }
    // sop
    const pre=Math.max(1,...scData.map(d=>d.devDays));
    const post=Math.max(1,...scData.map(d=>d.postDays));
    const dur=pre+post;
    const ref=new Date(2024,0,1);
    const sharedTickRange=[addD(ref,-pre),addD(ref,post)];
    return{sharedDuration:dur,getXFrac:(date,d)=>(pre+(new Date(date)-d.sopDate)/864e5)/dur,getTickRange:d=>[addD(d.sopDate,-pre),addD(d.sopDate,post)],sharedTickRange};
  },[scData,compareAlign]);
  const gran=axis.sharedDuration<550?"monthly":axis.sharedDuration<1100?"quarterly":"yearly";
  const todayFrac=useMemo(()=>{
    if(compareAlign!=="date"||!scData.length)return null;
    const s0=new Date(Math.min(...scData.map(d=>d.startDate.getTime())));
    const s1=new Date(Math.max(...scData.map(d=>d.displayEndDate.getTime())));
    const dur=(s1-s0)/864e5;
    return dur>0?(todayDate.getTime()-s0.getTime())/(dur*864e5):null;
  },[compareAlign,scData,todayDate]);
  const showToday=compareAlign==="date"&&todayFrac!=null&&todayFrac>0.001&&todayFrac<0.999;
  return(
    <div style={{paddingBottom:60}}>
      {/* Header — 3-column flex: [back+title] [legend centered] [alignment toggles] */}
      <div style={{display:"flex",alignItems:"center",paddingTop:16,marginBottom:18,gap:12}}>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:12,minWidth:0}}>
          <button onClick={onBack} style={{padding:"5px 12px",borderRadius:5,border:"1px solid "+t.border,cursor:"pointer",fontSize:13,fontWeight:600,background:t.btnBg,color:t.btnText,display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
            <span style={{fontSize:16,lineHeight:1,marginTop:-1}}>‹</span> Back
          </button>
          <span style={{fontSize:16,fontWeight:800,color:t.text,letterSpacing:0.2,whiteSpace:"nowrap"}}>Compare Scenarios</span>
        </div>
        <div style={{position:"relative",border:"1px solid "+t.border,borderRadius:6,padding:"10px 14px 8px",background:legendBg,display:"inline-flex",flexShrink:0}}>
          <div style={{position:"absolute",top:-9,left:10,padding:"0 5px",background:legendBg,fontSize:10,color:t.textDim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.6px"}}>Legend · Click to show/hide</div>
          <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
            <LegendItem shape="diamond" color={GATE_COLOR} label="Gate Review" tc={t.textMuted} onClick={()=>toggleRow("gates")} hidden={hiddenRows.gates}/>
            <LegendItem shape="diamond" color={TR_COLOR} label="Tech Review" tc={t.textMuted} onClick={()=>toggleRow("reviews")} hidden={hiddenRows.reviews}/>
            <LegendItem shape="bar" color="#b94a08" label="Robot Build" tc={t.textMuted} onClick={()=>toggleRow("builds")} hidden={hiddenRows.builds}/>
            <LegendItem shape="bar" color="#5b6abf" label="Testing" tc={t.textMuted} onClick={()=>toggleRow("testing")} hidden={hiddenRows.testing}/>
            {showToday&&<LegendItem shape="bar" color="#e74c3c" label="Today" tc={t.textMuted} onClick={toggleTodayLine} hidden={!showTodayLine}/>}
          </div>
        </div>
        <div style={{flex:1,display:"flex",justifyContent:"flex-end",alignItems:"center",gap:6,flexShrink:0}}>
          <button onClick={handleExportPNG} disabled={exporting}
            style={{padding:"5px 11px",borderRadius:5,border:"1px solid "+(isDark?"#1a4a2a":"#a8d5b8"),cursor:exporting?"wait":"pointer",fontSize:12,fontWeight:600,background:isDark?"#0e2a1a":"#e8f5ee",color:isDark?"#4caf80":"#1a7a40",display:"flex",alignItems:"center",gap:5,opacity:exporting?0.6:1,transition:"opacity 0.15s",flexShrink:0}}>
            <CameraIcon sz={13} c={isDark?"#4caf80":"#1a7a40"}/>{exporting?"Exporting…":"PNG"}
          </button>
          <div style={{width:1,height:20,background:t.border,flexShrink:0}}/>
          {[["date","By Date"],["start","By Start"],["sop","By SOP"]].map(([a,lbl])=>(
            <button key={a} onClick={()=>setCompareAlign(a)}
              style={{padding:"5px 14px",borderRadius:5,border:"1px solid "+(compareAlign===a?"#3b82f6":t.border),cursor:"pointer",fontSize:12,fontWeight:compareAlign===a?700:400,background:compareAlign===a?"#3b82f6":t.btnBg,color:compareAlign===a?"#fff":t.btnText,transition:"background 0.15s"}}>
              {lbl}
            </button>
          ))}
        </div>
      </div>
      {/* Strips — wrapped in capture target for PNG export */}
      <div ref={captureRef} style={{background:isDark?"#0b1220":"#ffffff",padding:"8px 0 4px"}}>
      {scData.map((d,idx)=>{
        const tickRange=axis.sharedTickRange||axis.getTickRange(d);
        const tks=getTicks(tickRange[0],tickRange[1],gran);
        const xFrac=date=>axis.getXFrac(date,d);
        const sopX=xFrac(d.sopDate);
        return<CompareStrip key={d.sc.key} data={d} ticks={tks} xFrac={xFrac} sopX={sopX}
          accentColor={COMPARE_ACCENTS[idx]} compareAlign={compareAlign}
          todayFrac={compareAlign==="date"?todayFrac:null}
          showTodayLine={showTodayLine} hiddenRows={hiddenRows} t={t} isDark={isDark}/>;
      })}
      </div>
      {/* Add More Scenarios */}
      <div style={{marginTop:28,border:"1px solid "+t.border,borderRadius:10,overflow:"hidden",background:t.cardBg}}>
        <div onClick={()=>setAddOpen(v=>!v)}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 18px",cursor:"pointer",userSelect:"none",background:addOpen?(isDark?"rgba(255,255,255,0.04)":"#f5f7fa"):t.cardBg,transition:"background 0.15s"}}
          onMouseEnter={e=>e.currentTarget.style.background=isDark?"rgba(255,255,255,0.06)":"#eef1f6"}
          onMouseLeave={e=>e.currentTarget.style.background=addOpen?(isDark?"rgba(255,255,255,0.04)":"#f5f7fa"):t.cardBg}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:17,lineHeight:1,color:"#3b82f6"}}>＋</span>
            <span style={{fontSize:13,fontWeight:700,color:t.text}}>Add Scenarios to Comparison</span>
            {selected.length<5&&<span style={{fontSize:11,color:t.textMuted,fontWeight:400}}>({selected.length}/5 selected)</span>}
          </div>
          <span style={{fontSize:13,color:t.textMuted,display:"inline-block",transition:"transform 0.2s",transform:addOpen?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
        </div>
        {addOpen&&(
          <div style={{borderTop:"1px solid "+t.border,padding:"16px 0 0"}}>
            <ScenarioTable scenarios={scenarios||[]} loading={!!scenariosLoading}
              saveError={saveError||""} setSaveError={setSaveError||function(){}} scenarioName={scenarioName||""} setScenarioName={setScenarioName||function(){}}
              onSave={onSave||function(){}} onOverwrite={onOverwrite||function(){}} onRestore={onRestore||function(){}}
              onDelete={onDelete||function(){}} onRename={onRename||function(){}} onDuplicate={onDuplicate||function(){}}
              onRefresh={onRefresh||function(){}} onPublish={onPublish||function(){}} publishedKeys={publishedKeys||new Set()}
              compareIds={compareIds||new Set()} onToggleCompare={onToggleCompare||function(){}} loadedKey={loadedScenarioKey}
              t={t} isDark={isDark} showSaveForm={false}/>
            <SharedScenarioTable sharedScenarios={sharedScenarios||[]} loading={!!sharedLoading}
              shareError={shareError||""} currentUser={currentUser}
              onRestore={onRestore||function(){}} onUnpublish={onUnpublish||function(){}} onDuplicate={onDuplicateShared||function(){}} onRenameShared={onRenameShared||function(){}} onRefresh={onRefreshShared||function(){}}
              compareIds={compareIds||new Set()} onToggleCompare={onToggleCompare||function(){}}
              t={t} isDark={isDark}/>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Sign-in screen (shown when no Supabase session) ──────────────────────────

        <div style={{fontSize:22,fontWeight:800,color:t.text,marginBottom:6,letterSpacing:0.2}}>Project Timeline Tool</div>
        <div style={{fontSize:13,color:t.textMuted,marginBottom:28,lineHeight:1.6}}>Sign in with your email to access your saved scenarios. No password needed — we'll send a magic link.</div>

          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:36,marginBottom:12}}>📬</div>

            <div style={{fontSize:13,color:t.textMuted,lineHeight:1.6}}>We sent a sign-in link to <strong style={{color:t.text}}>{email}</strong>.<br/>Click it to continue.</div>
            <button onClick={()=>{setSent(false);setEmail("");}} style={{marginTop:16,fontSize:12,color:t.textDim,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Use a different email</button>
          </div>

          <form onSubmit={handleSend}>
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:t.textMuted,marginBottom:6,letterSpacing:0.2}}>Email address</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"
                autoFocus
                style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid "+t.border,fontSize:14,background:t.inBg,color:t.inText,outline:"none",boxSizing:"border-box",colorScheme:isDark?"dark":"light"}}/>
            </div>
            {error&&<div style={{fontSize:12,color:t.dangerText,marginBottom:12,background:isDark?t.dangerBg:"#fff4f4",padding:"6px 10px",borderRadius:4}}>{error}</div>}
            <button type="submit" disabled={loading}
              style={{width:"100%",padding:"10px",borderRadius:6,border:"none",cursor:loading?"wait":"pointer",fontSize:14,fontWeight:700,background:"#3b82f6",color:"#fff",opacity:loading?0.7:1,transition:"opacity 0.15s"}}>
              {loading?"Sending…":"Send magic link"}
            </button>

        )}
      </div>
    </div>
  );
}

// ── Error Boundary ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null}; }
  static getDerivedStateFromError(error) { return {error}; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40, textAlign:"center", fontFamily:"Inter,system-ui,sans-serif"}}>
        <div style={{fontSize:18, fontWeight:700, color:"#c0392b", marginBottom:12}}>Something went wrong</div>
        <div style={{fontSize:13, color:"#526880", marginBottom:20}}>{String(this.state.error)}</div>
        <button onClick={()=>this.setState({error:null})}
          style={{padding:"8px 20px", borderRadius:5, border:"none", cursor:"pointer", background:"#1e60a5", color:"#fff", fontWeight:700, fontSize:14}}>
          Try Again
        </button>
      </div>
    );
    return this.props.children;
  }
}

// ── Mobile detection ──────────────────────────────────────────────────────────
function useIsMobile(bp=640){
  const[mob,setMob]=useState(()=>window.matchMedia(`(max-width:${bp}px)`).matches);
  useEffect(()=>{
    const mq=window.matchMedia(`(max-width:${bp}px)`);
    setMob(mq.matches);
    const fn=(e)=>setMob(e.matches);
    if(mq.addEventListener)mq.addEventListener('change',fn);
    else mq.addListener(fn);
    return()=>{if(mq.removeEventListener)mq.removeEventListener('change',fn);else mq.removeListener(fn);};
  },[bp]);
  return mob;
}
function useIsPortrait(){
  const[portrait,setPortrait]=useState(()=>window.matchMedia('(orientation:portrait)').matches);
  useEffect(()=>{
    const mq=window.matchMedia('(orientation:portrait)');
    setPortrait(mq.matches);
    const fn=(e)=>setPortrait(e.matches);
    if(mq.addEventListener)mq.addEventListener('change',fn);
    else mq.addListener(fn);
    return()=>{if(mq.removeEventListener)mq.removeEventListener('change',fn);else mq.removeListener(fn);};
  },[]);
  return portrait;
}

  function setPhaseWeeks(idx,wks){

    wks=Math.min(wks,maxWks);
    const nf=clamp(wks/(devDays/7),0.01,0.95),of=n[idx];
    if(Math.abs(nf-of)<0.001)return;
    const sc=(1-nf)/Math.max(0.001,1-of);

  function getLabelForBar(bar,list){const s=list.filter(b=>b.family===bar.family).length;return buildLabel(bar.family,bar.seq,s);}

      const mid=(b.s+b.e)/2,gap=0.03,nk=maxKey(prev);
      const b1={...b,e:mid-gap/2},b2={...b,key:nk,s:mid+gap/2};
      let r=prev.map(x=>x.key===key?b1:x);
      r.splice(r.findIndex(x=>x.key===key)+1,0,b2);

  function renameBuildBar(key,label){const l=eggName(label);if(l!==label)triggerConfetti();pushSnap({...snap,dbList:snap.dbList.map(b=>b.key===key?{...b,label:l}:b)});}
  function renameTestBar(key,label){const l=eggName(label);if(l!==label)triggerConfetti();pushSnap({...snap,testBars:(snap.testBars||[]).map(b=>b.key===key?{...b,id:l}:b)});}
  function addBuildBar(e){
    const rect=timelineRef.current?.getBoundingClientRect();if(!rect)return;
    const x=(e.clientX-rect.left)/rect.width;
    let pi=0;for(let i=0;i<n.length;i++){const ps=st[i]*dspDevFrac,pe=(st[i]+n[i])*dspDevFrac;if(x>=ps&&x<pe){pi=i;break;}if(i===n.length-1)pi=i;}
    const phW=n[pi]*dspDevFrac,ps2=st[pi]*dspDevFrac;
    const frac=phW>0?clamp((x-ps2)/phW,0.05,0.95):0.5;
    const s=Math.max(0.01,frac-0.1),ev=Math.min(0.99,frac+0.1);
    setPendingCreate({type:"build",phase:pi,s,e:ev,clientX:e.clientX,clientY:e.clientY});
  }
  function addTestBar(e){
    const rect=timelineRef.current?.getBoundingClientRect();if(!rect)return;

    const{key:_k,name,created:_c,modified:_m,source:_s,...dataPayload}=sc;

      const{error}=await sbClient.from('shared_scenarios').insert({scenario_key:sc.key,name,owner:currentUser,data:dataPayload});

  async function bulkPublishScenarios(scs){
    if(!currentUser||!scs.length)return;
    setShareError("");
    try{
      await Promise.all(scs.map(async sc=>{
        const{key:_k,name,created:_c,modified:_m,source:_s,...dataPayload}=sc;
        const{data:existing,error:lookupErr}=await sbClient.from('shared_scenarios').select('id').eq('scenario_key',sc.key).eq('owner',currentUser).maybeSingle();
        if(lookupErr)throw lookupErr;
        if(existing){
          await sbClient.from('shared_scenarios').update({name,data:dataPayload,published_at:new Date().toISOString()}).eq('id',existing.id);
        }else{
          await sbClient.from('shared_scenarios').insert({scenario_key:sc.key,name,owner:currentUser,data:dataPayload});

      }));
    }catch(e){setShareError("Bulk publish failed. Try again.");return;}
    await loadSharedScenarios();
  }

  function handleImportFile(e){
    const file=e.target.files?.[0];if(!file)return;
    setImportError("");setImportSuccess("");
    const rawName=file.name.replace(/\.csv$/i,"").trim()||"Imported";
    const reader=new FileReader();
    reader.onload=async evt=>{
      try{
        const result=importCSV(evt.target.result,initSnap);
        if(!result){setImportError("Could not parse CSV.");return;}
        pushSnap(result.snap);setMode(result.mode||"forward");
        if(result.gran)setGran(result.gran);
        // auto-save using filename as scenario name (dedup with suffix if needed)
        const existingNames=new Set(scenarios.map(s=>s.name));
        let name=rawName;let suffix=2;
        while(existingNames.has(name))name=`${rawName} (${suffix++})`;
        const payload={...result.snap,anchor:toInp(result.snap.anchor),mode:result.mode||"forward",gran:result.gran||gran};
        const{data,error}=await sbClient.from('scenarios').insert({name,data:payload}).select().single();
        if(error){setImportError("Imported but failed to save. Try saving manually.");return;}
        const saved=sbRow(data);
        setScenarios(prev=>[saved,...prev]);
        setLoadedScenarioKey(saved.key);
        setImportSuccess(`Imported & saved as "${name}"`);setTimeout(()=>setImportSuccess(""),4000);
      }catch(err){setImportError("Import failed: "+err.message);}
    };
    reader.onerror=()=>{setImportError("Could not read file.");};
    reader.readAsText(file);e.target.value="";
  }

  useEffect(()=>{
    function onMove(e){
      const d=drag.current;if(!d)return;
      const rect=timelineRef.current?.getBoundingClientRect();if(!rect)return;
      const dx=(e.clientX-d.x0)/rect.width;
      const base=dragSnap.current,bn=normP(base.pcts);
      let next=null;
      if(d.type==="phase"){const sum=base.pcts.reduce((a,b)=>a+b,0);if(modeRef.current==="both"){const delta=dx/dspDevFrac*sum,min=sum*0.02;const nA=d.p0[d.idx]+delta,nB=d.p0[d.idx+1]-delta;if(nA>=min&&nB>=min){const np=[...d.p0];np[d.idx]=nA;np[d.idx+1]=nB;next={...base,pcts:np};}}else{const deltaDays=(dx/dspDevFrac)*base.durDays;const newDurDays=base.durDays+deltaDays;const minDays=base.durDays*0.02;if(newDurDays>minDays){const np=d.p0.map((p,i)=>i===d.idx?(p/sum*base.durDays+deltaDays)*sum/newDurDays:p*base.durDays/newDurDays);if(np.every(v=>v>0)){next={...base,pcts:np,durDays:newDurDays};}}}}
      else if(d.type==="tr"){const phW=dspDevFrac*bn[d.phase];const np=[...base.trPos];np[d.trIdx]=clamp(d.pos0+dx/phW,0.02,0.98);next={...base,trPos:np};}
      else if(d.type==="customTr"){const phW=dspDevFrac*bn[d.phase];const np=(base.customTrs||[]).map(tr=>tr.key===d.trKey?{...tr,pos:clamp(d.pos0+dx/phW,0.02,0.98)}:tr);next={...base,customTrs:np};}
      else if(d.type==="customGate"){const phW=dspDevFrac*bn[d.phase];const np=(base.customGates||[]).map(g=>g.key===d.gateKey?{...g,pos:clamp(d.pos0+dx/phW,0.02,0.98)}:g);next={...base,customGates:np};}
      else if(d.type==="build-left"){const phW=dspDevFrac*bn[d.phase];next={...base,dbList:base.dbList.map(b=>b.key===d.bKey?{...b,s:clamp(d.s0+dx/phW,0.01,d.e0-0.05)}:b)};}
      else if(d.type==="build-right"){const phW=dspDevFrac*bn[d.phase];next={...base,dbList:base.dbList.map(b=>b.key===d.bKey?{...b,e:clamp(d.e0+dx/phW,d.s0+0.05,0.99)}:b)};}
      else if(d.type==="build-body"){const phW=dspDevFrac*bn[d.phase];const span=d.e0-d.s0,newS=clamp(d.s0+dx/phW,0.01,0.99-span);next={...base,dbList:base.dbList.map(b=>b.key===d.bKey?{...b,s:newS,e:newS+span}:b)};}
      else if(d.type==="test-left"){const phW=dspDevFrac*bn[d.phase];next={...base,testBars:base.testBars.map(b=>b.key===d.bKey?{...b,s:clamp(d.s0+dx/phW,0.01,d.e0-0.05)}:b)};}
      else if(d.type==="test-right"){const phW=dspDevFrac*bn[d.phase];next={...base,testBars:base.testBars.map(b=>b.key===d.bKey?{...b,e:clamp(d.e0+dx/phW,d.s0+0.05,4.0)}:b)};}
      else if(d.type==="test-body"){const phW=dspDevFrac*bn[d.phase];const span=d.e0-d.s0,newS=clamp(d.s0+dx/phW,0.01,4.0-span);next={...base,testBars:base.testBars.map(b=>b.key===d.bKey?{...b,s:newS,e:newS+span}:b)};}
      if(next){liveSnap.current=next;}
      forceUpdate(x=>x+1);
    }
    function onUp(){if(liveSnap.current)pushSnap(liveSnap.current);drag.current=null;liveSnap.current=null;dragSnap.current=null;forceUpdate(x=>x+1);}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
