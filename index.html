function normP(pcts) {
  const sum = pcts.reduce((a, b) => a + b, 0);
  return pcts.map(v => v / sum);
}
function mkSt(normalized) {
  const starts = [];
  let cursor = 0;
  normalized.forEach(v => { starts.push(cursor); cursor += v; });
  return starts;
}
function fmtW(weeks) {
  weeks = Math.round(weeks);
  if (weeks >= 52) return (weeks / 52).toFixed(1) + "yr";
  if (weeks >= 8) return Math.round(weeks / 4.33) + "mo";
  return weeks + "wk";
}
function fmtD(d) {
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
}
function fmtDT(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"})
    + " " + d.toLocaleTimeString("en-US", {hour:"numeric", minute:"2-digit"});
}
function toInp(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function frInp(s) {
  const [y, m, day] = s.split("-").map(Number);
  return new Date(y, m - 1, day);
}
function addD(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function addY(d, n) { const r = new Date(d); r.setFullYear(r.getFullYear() + n); return r; }
function dBetw(a, b) { return Math.max(7, Math.round((b - a) / 864e5)); }
function pc(x) { return (x * 100) + "%"; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function makeDefaultDbList() {
  return BUILD_FAMILIES.map((f, i) => ({key:i, family:f.letter, seq:1, phase:f.phase, s:f.s, e:f.e}));
}
function maxKey(list) { return list.reduce((m, b) => Math.max(m, b.key), -1) + 1; }
function resequence(list, fam) {
  let seq = 1;
  return list.map(b => b.family === fam ? {...b, seq: seq++} : b);
}
function buildLabel(fam, seq, siblings) { return siblings > 1 ? `${fam}${seq}` : `${fam}-Build`; }
function today0() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }

function getTicks(start, end, gran) {
  const ms = end - start;
  if (ms <= 0) return [];
  const ticks = [];
  const totalMonths = Math.round(ms / (30.44 * 864e5));
  let cursor, safe, x;

  if (gran === "yearly") {
    cursor = new Date(start.getFullYear(), 0, 1);
    if (cursor < start) cursor = new Date(cursor.getFullYear() + 1, 0, 1);
    for (safe = 0; cursor <= end && safe < 300; safe++) {
      x = (cursor - start) / ms;
      if (x >= 0 && x <= 1) ticks.push({x, label: String(cursor.getFullYear()), major: true});
      cursor = new Date(cursor.getFullYear() + 1, 0, 1);
    }
    return ticks;
  }

  if (gran === "quarterly") {
    const startQ = Math.floor(start.getMonth() / 3) * 3;
    cursor = new Date(start.getFullYear(), startQ, 1);
    if (cursor < start) cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 3, 1);
    for (safe = 0; cursor <= end && safe < 300; safe++) {
      x = (cursor - start) / ms;
      if (x >= 0 && x <= 1) {
        const qNum = Math.floor(cursor.getMonth() / 3) + 1;
        const lbl = qNum === 1 ? "Q1 '" + String(cursor.getFullYear()).slice(2) : "Q" + qNum;
        ticks.push({x, label: lbl, major: cursor.getMonth() === 0});
      }
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 3, 1);
    }
    return ticks;
  }

  // Monthly
  const skip = totalMonths > 48 ? 6 : totalMonths > 24 ? 3 : totalMonths > 12 ? 2 : 1;
  cursor = new Date(start.getFullYear(), start.getMonth(), 1);
  if (cursor < start) cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  for (safe = 0, x = 0; cursor <= end && safe < 300; safe++) {
    const frac = (cursor - start) / ms;
    if (frac >= 0 && frac <= 1) {
      const isMajor = cursor.getMonth() === 0;
      const lbl = isMajor
        ? MO[0] + " '" + String(cursor.getFullYear()).slice(2)
        : (safe % skip === 0 ? MO[cursor.getMonth()] : "");
      ticks.push({x: frac, label: lbl, major: isMajor});
    }
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }
  return ticks;
}

const CSV_META="##PDP_META:";
function exportCSVFull(snap,mode,gran,startDate,sopDate,launchEndDate,sustainEndDate,devDays,n,devPhaseStart,devPhaseEnd,devPhaseDate,dbList,trVisible,trPos,launchWeeks,sustainWeeks,testBars){
  const fmt=d=>fmtD(d);
  const meta={snap:{...snap,anchor:toInp(snap.anchor)},mode,gran};
  const metaRow=[CSV_META+JSON.stringify(meta),"","","","","",""];
  const rows=[["Task Name","Start Date","End Date","Duration (days)","% Complete","Predecessors","Notes"]];
  PHASES.forEach((ph,i)=>rows.push([`Ph${i} – ${ph.name}`,fmt(devPhaseStart(i)),fmt(devPhaseEnd(i)),Math.round(n[i]*devDays),"","",ph.desc]));
  n.forEach((_,i)=>{const gd=devPhaseDate(i,1);rows.push([i===6?"G6 – SOP":i===5?"G5 – Model Fix":`G${i} – ${GATE_DESC[i]}`,fmt(gd),fmt(gd),0,"","",GATE_DESC[i]]);});
  DEFAULT_TR.forEach((tr,i)=>{if(!trVisible[i])return;const d=devPhaseDate(tr.phase,trPos[i]);rows.push([`${tr.id} – ${tr.desc}`,fmt(d),fmt(d),0,"","",tr.desc]);});
  dbList.forEach(b=>{const siblings=dbList.filter(x=>x.family===b.family).length;const lbl=buildLabel(b.family,b.seq,siblings);const ds=devPhaseDate(b.phase,b.s),de=devPhaseDate(b.phase,b.e);rows.push([lbl,fmt(ds),fmt(de),Math.round((de-ds)/864e5),"","","Robot Build"]);});
  testBars.forEach(b=>{const ds=devPhaseDate(b.phase,b.s),de=devPhaseDate(b.phase,b.e);rows.push([b.id,fmt(ds),fmt(de),Math.round((de-ds)/864e5),"","","Testing"]);});
  rows.push(["Ph7 – Launch",fmt(sopDate),fmt(launchEndDate),launchWeeks*7,"","","LRIP, GA, scale production ramp"]);
  rows.push(["Ph8 – Sustain",fmt(launchEndDate),fmt(sustainEndDate),sustainWeeks*7,"","","Full-rate production"]);
  const all=[metaRow,...rows];
  const csv=all.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="pdp_timeline.csv";a.click();URL.revokeObjectURL(url);
}

function importCSV(text,initSnap){
  const lines=text.trim().split(/\r?\n/);if(!lines.length)return null;
  function pf(line){const f=[];let cur="",inQ=false;for(let j=0;j<line.length;j++){const ch=line[j];if(ch==='"'){if(inQ&&line[j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}else if(ch===','&&!inQ){f.push(cur);cur="";}else cur+=ch;}f.push(cur);return f;}
  const ff=pf(lines[0]);
  if((ff[0]||"").startsWith(CSV_META)){
    try{
      const meta=JSON.parse((ff[0]||"").slice(CSV_META.length));
      const s=meta.snap;
      return{snap:{pcts:Array.isArray(s.pcts)&&s.pcts.length===PHASES.length?s.pcts:[...DEFAULT_PCTS],trPos:s.trPos||DEFAULT_TR.map(r=>r.pos),trVisible:s.trVisible||DEFAULT_TR.map(()=>true),dbList:Array.isArray(s.dbList)?s.dbList:makeDefaultDbList(),testBars:Array.isArray(s.testBars)?s.testBars:null,anchor:frInp(s.anchor),durDays:s.durDays||Math.round(365.25*2),launchWeeks:s.launchWeeks||DEFAULT_LAUNCH_WK,sustainWeeks:s.sustainWeeks||DEFAULT_SUSTAIN_WK,completed:s.completed||{}},mode:meta.mode,gran:meta.gran};
    }catch{}
  }
  const header=lines[0].replace(/^\uFEFF/,"");
  const cols=header.split(",").map(c=>c.replace(/^"|"$/g,"").trim());
  const ni=cols.findIndex(c=>/task.?name/i.test(c)),si=cols.findIndex(c=>/start.?date/i.test(c)),ei=cols.findIndex(c=>/end.?date/i.test(c));
  if(ni<0||si<0||ei<0)return null;
  const rows=[];
  for(let i=1;i<lines.length;i++){const line=lines[i];if(!line.trim())continue;const fields=pf(line);const name=(fields[ni]||"").trim(),ss=(fields[si]||"").trim(),es=(fields[ei]||"").trim();if(!name||!ss)continue;const start=new Date(ss),end=es?new Date(es):start;if(isNaN(start))continue;rows.push({name,start,end:isNaN(end)?start:end});}
  if(!rows.length)return null;
  const pr=PHASES.map((_,i)=>rows.find(r=>new RegExp(`Ph${i}[\\s–-]`,"i").test(r.name)));
  const ph0=pr[0],ph6=pr[6];if(!ph0||!ph6)return null;
  const startDate=ph0.start,sopDate=addD(ph6.end,1);
  const durDays=Math.max(7,Math.round((sopDate-startDate)/864e5));
  let pcts=[...DEFAULT_PCTS];
  if(pr.every(Boolean)){const rd=pr.map(r=>Math.max(1,Math.round((r.end-r.start)/864e5)+1));const total=rd.reduce((a,b)=>a+b,0);pcts=rd.map(d=>d/total);}
  const lr=rows.find(r=>/Ph7|Launch/i.test(r.name)),sr=rows.find(r=>/Ph8|Sustain/i.test(r.name));
  return{snap:{...initSnap,pcts,anchor:startDate,durDays,launchWeeks:lr?Math.max(4,Math.round((lr.end-lr.start)/864e5/7)):DEFAULT_LAUNCH_WK,sustainWeeks:sr?Math.max(4,Math.round((sr.end-sr.start)/864e5/7)):DEFAULT_SUSTAIN_WK},mode:"forward",gran:"quarterly"};
}

function useUndoable(initial){
  const[idx,setIdx]=useState(0);const history=useRef([initial]);
  const current=history.current[idx];
  const push=useCallback(ns=>{history.current=history.current.slice(0,idx+1);history.current.push(ns);if(history.current.length>MAX_HISTORY+1)history.current.shift();setIdx(history.current.length-1);},[idx]);
  const undo=useCallback(()=>{if(idx>0)setIdx(i=>i-1);},[idx]);
  const redo=useCallback(()=>{if(idx<history.current.length-1)setIdx(i=>i+1);},[idx]);
  return{current,push,undo,redo,canUndo:idx>0,canRedo:idx<history.current.length-1};
}

// Bug report modal
function BugModal({t,isDark,onClose}){
  const[text,setText]=useState("");
  function submit(){
    if(!text.trim())return;
    const subject=encodeURIComponent("Schedule Scenario Tool Bug Report");
    const body=encodeURIComponent(text.trim());
    window.open(`mailto:oliver.majer.lewis+git@gmail.com?subject=${subject}&body=${body}`);
    onClose();
  }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:t.panel,border:"1px solid "+t.border,borderRadius:10,padding:28,width:480,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
        <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          <BugIcon sz={18} c={t.textMuted}/> Report a Bug
        </div>
        <div style={{fontSize:13,color:t.textMuted,marginBottom:14}}>Describe the issue and your expected behavior. Clicking Submit will open your email client with this report addressed to the dev team.</div>
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder="Describe what happened, what you expected, and steps to reproduce…"
          style={{width:"100%",height:140,background:t.inBg,border:"1px solid "+t.inBorder,color:t.inText,borderRadius:6,padding:"8px 10px",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
          <button onClick={onClose} style={{padding:"6px 16px",borderRadius:5,border:"1px solid "+t.border,cursor:"pointer",fontSize:13,fontWeight:600,background:t.btnBg,color:t.btnText}}>Cancel</button>
          <button onClick={submit} disabled={!text.trim()} style={{padding:"6px 16px",borderRadius:5,border:"none",cursor:text.trim()?"pointer":"not-allowed",fontSize:13,fontWeight:700,background:t.btnAct,color:"#fff",opacity:text.trim()?1:0.5}}>Submit via Email</button>
        </div>
      </div>
    </div>
  );
}

}

// Diamond
function Diamond({x,label,sub,color,sz=12,tc,sc,date,desc,t,onDragStart,onDelete,completed,onToggleComplete}){
  const[hov,setHov]=useState(false);const timer=useRef(null);const showTimer=useRef(null);
  function enter(){clearTimeout(timer.current);clearTimeout(showTimer.current);showTimer.current=setTimeout(()=>setHov(true),350);}
  function leave(){clearTimeout(showTimer.current);timer.current=setTimeout(()=>setHov(false),150);}
  useEffect(()=>()=>{clearTimeout(timer.current);clearTimeout(showTimer.current);},[]);
  const d=sz*1.6,pts=(d/2)+",1 "+(d-1)+","+(d/2)+" "+(d/2)+","+(d-1)+" 1,"+(d/2);
  return(
    <div style={{position:"absolute",left:pc(x),transform:"translateX(-50%)",display:"inline-flex",flexDirection:"column",alignItems:"center",top:18,zIndex:hov?60:5,cursor:onDragStart?"ew-resize":"default"}}

// ── Error Boundary ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null}; }
  static getDerivedStateFromError(error) { return {error}; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40, textAlign:"center", fontFamily:"Inter,system-ui,sans-serif"}}>
        <div style={{fontSize:18, fontWeight:700, color:"#c0392b", marginBottom:12}}>Something went wrong</div>
        <div style={{fontSize:13, color:"#526880", marginBottom:20}}>{String(this.state.error)}</div>
        <button onClick={()=>this.setState({error:null})}
          style={{padding:"8px 20px", borderRadius:5, border:"none", cursor:"pointer", background:"#1e60a5", color:"#fff", fontWeight:700, fontSize:14}}>
          Try Again
        </button>
      </div>
    );
    return this.props.children;
  }
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const defaultDurDays=useMemo(()=>Math.round(365.25*2),[]);
  const defaultSop=useMemo(()=>addY(today0(),2.5),[]);
  const defaultStartDate=useMemo(()=>addD(defaultSop,-defaultDurDays),[]);

  // Test bars stored as phase-relative fractions; values > 1.0 extend into subsequent phases.
  const initTestBars=useMemo(()=>{
    const ph4Months=(DEFAULT_PCTS[4]*defaultDurDays/7)/4.33;
    const ph5Months=(DEFAULT_PCTS[5]*defaultDurDays/7)/4.33;
    return[
      {key:"evt",id:"EVT",phase:4,s:0.82,e:0.82+2/ph4Months},
      {key:"dvt",id:"DVT",phase:5,s:0.82,e:0.82+4/ph5Months},
    ];
  },[]);

  const initSnap=useMemo(()=>({
    pcts:[...DEFAULT_PCTS],trPos:DEFAULT_TR.map(r=>r.pos),
    trVisible:DEFAULT_TR.map(()=>true),dbList:makeDefaultDbList(),
    testBars:initTestBars,
    anchor:defaultStartDate,durDays:defaultDurDays,
    launchWeeks:DEFAULT_LAUNCH_WK,sustainWeeks:DEFAULT_SUSTAIN_WK,
    completed:{},
  }),[]);

  const{current:snap,push:pushSnap,undo,redo,canUndo,canRedo}=useUndoable(initSnap);
  const[isDark,setDark]=useState(false);

  const[mode,setMode]=useState(null);
  const modeRef=useRef(null);useEffect(()=>{modeRef.current=mode;},[mode]);
  const[gran,setGran]=useState("monthly");
  const[confirmReset,setConfirmReset]=useState(false);
  const[scenarios,setScenarios]=useState([]);
  const[scenarioName,setScName]=useState("");
  const[saveError,setSaveError]=useState("");
  const[importError,setImportError]=useState("");
  const[importSuccess,setImportSuccess]=useState("");
  const[showBug,setShowBug]=useState(false);
  const[todayDate,setTodayDate]=useState(today0);
  const[hiddenRows,setHiddenRows]=useState({gates:false,reviews:false,builds:false,testing:false});
  const[showTodayLine,setShowTodayLine]=useState(true);
  const importInputRef=useRef(null);
  const timelineRef=useRef(null);
  const drag=useRef(null),dragSnap=useRef(null),liveSnap=useRef(null);
  const[,forceUpdate]=useState(0);

  // Use the live drag position for rendering, but only commit to undo history on mouseup.
  const renderSnap=drag.current&&liveSnap.current?liveSnap.current:snap;
  const{pcts,trPos,trVisible,dbList,testBars,anchor,durDays,launchWeeks,sustainWeeks,completed}=renderSnap;
  function ap(p){pushSnap({...snap,...p});}
  function toggleComplete(key){const c=snap.completed||{};ap({completed:{...c,[key]:!c[key]}});}
  function toggleRow(key){setHiddenRows(h=>({...h,[key]:!h[key]}));}
  function setPcts(v){ap({pcts:typeof v==="function"?v(pcts):v});}
  function setTrPos(v){ap({trPos:typeof v==="function"?v(trPos):v});}
  function setTrVisible(v){ap({trVisible:typeof v==="function"?v(trVisible):v});}
  function setDbList(v){ap({dbList:typeof v==="function"?v(dbList):v});}
  function setTestBars(v){ap({testBars:typeof v==="function"?v(testBars):v});}
  function setAnchor(v){ap({anchor:v});}
  function setDurDays(v){ap({durDays:v});}
  function setLaunchWk(v){ap({launchWeeks:v});}
  function setSustainWk(v){ap({sustainWeeks:v});}

  // Refresh Today
  function refreshToday(){setTodayDate(today0());}
  useEffect(()=>{const id=setInterval(()=>setTodayDate(today0()),60000);return()=>clearInterval(id);},[]);

  const t=isDark?DARK:LIGHT;
  const n=normP(pcts),st=mkSt(n);
  const devDays=durDays,launchDays=launchWeeks*7,sustainDays=sustainWeeks*7;
  const startDate=mode==="backward"?addD(anchor,-devDays):anchor;
  const sopDate=addD(startDate,devDays);
  const launchEndDate=addD(sopDate,launchDays);
  const sustainEndDate=addD(launchEndDate,sustainDays);
  const dspPostDays=Math.min(launchDays+sustainDays,POST_SOP_DISPLAY);
  const dspTotalDays=devDays+dspPostDays;
  const dspDevFrac=devDays/dspTotalDays;
  const dspLaunchDays=Math.min(launchDays,POST_SOP_DISPLAY);
  const dspSustainDays=Math.max(0,dspPostDays-dspLaunchDays);
  const dspLaunchFrac=dspLaunchDays/dspTotalDays;
  const dspSustainFrac=dspSustainDays/dspTotalDays;
  const displayEndDate=addD(sopDate,dspPostDays);
  const truncated=dspPostDays<launchDays+sustainDays;

  function dspDevPos(ph,rel){return dspDevFrac*(st[ph]+n[ph]*rel);}
  function devPhaseDate(ph,rel){return addD(startDate,Math.round(devDays*(st[ph]+n[ph]*rel)));}
  function devPhaseStart(idx){return addD(startDate,Math.round(devDays*st[idx]));}
  function devPhaseEnd(idx){return addD(startDate,Math.round(devDays*(st[idx]+n[idx])));}

  const todayDispFrac=mode!=null&&startDate instanceof Date&&!isNaN(startDate)
    ?(todayDate.getTime()-startDate.getTime())/(864e5*dspTotalDays):-1;
  const showToday=mode!=null&&todayDispFrac>=0&&todayDispFrac<=1;
  const showG7=launchEndDate<=displayEndDate;

  const ticks=useMemo(()=>mode!=null?getTicks(startDate,displayEndDate,gran):[],[startDate?.getTime(),displayEndDate?.getTime(),gran,mode]);
  const approxYr=durDays/365.25;
  const actYrBtn=[1,2,3,4,5].find(y=>Math.abs(approxYr-y)<0.05)||null;
  const planningEnd=dspDevFrac*(st[3]||0),developEnd=dspDevFrac;

  function setPhaseWeeks(idx,wks){
    wks=Math.max(1,Math.round(wks));
    const maxWks=Math.floor((devDays/7)*0.95);
    wks=Math.min(wks,maxWks);
    const nf=clamp(wks/(devDays/7),0.01,0.95),of=n[idx];
    if(Math.abs(nf-of)<0.001)return;
    const sc=(1-nf)/Math.max(0.001,1-of);
    setPcts(n.map((v,i)=>i===idx?nf:v*sc));
  }
  function setPhasePercent(idx,p){
    const maxPct=95;
    p=clamp(p,0.5,maxPct);
    setPhaseWeeks(idx,p/100*(devDays/7));
  }
  function setPhaseStartDate(idx,v){
    const nd=frInp(v);
    if(idx===0){const d=Math.max(7,Math.round((sopDate-nd)/864e5));setDurDays(d);if(mode==="forward"||mode==="both")setAnchor(nd);}
    else{const ps=devPhaseStart(idx-1);setPhaseWeeks(idx-1,Math.max(1,Math.round((nd-ps)/864e5))/7);}
  }
  function setPhaseEndDate(idx,v){
    const nd=frInp(v);
    if(idx===PHASES.length-1){setDurDays(Math.max(7,Math.round((nd-startDate)/864e5)));}
    else{const ps=devPhaseStart(idx);setPhaseWeeks(idx,Math.max(1,Math.round((nd-ps)/864e5))/7);}
  }

  function getLabelForBar(bar,list){const s=list.filter(b=>b.family===bar.family).length;return buildLabel(bar.family,bar.seq,s);}
  function deleteDb(key){setDbList(prev=>{const r=prev.find(b=>b.key===key);if(!r)return prev;return resequence(prev.filter(b=>b.key!==key),r.family);});}
  function splitDb(key){
    setDbList(prev=>{
      const b=prev.find(x=>x.key===key);if(!b)return prev;
      const mid=(b.s+b.e)/2,gap=0.03,nk=maxKey(prev);
      const b1={...b,e:mid-gap/2},b2={...b,key:nk,s:mid+gap/2};
      let r=prev.map(x=>x.key===key?b1:x);
      r.splice(r.findIndex(x=>x.key===key)+1,0,b2);
      return resequence(r,b.family);
    });
  }
  function deleteTr(idx){setTrVisible(prev=>{const np=[...prev];np[idx]=false;return np;});}
  function deleteTestBar(key){setTestBars(prev=>prev.filter(b=>b.key!==key));}
  function doReset(){pushSnap({...initSnap});setConfirmReset(false);}

  // localStorage
  const LS_KEY="pdp_scenarios";
  function loadScenarios(){try{const raw=localStorage.getItem(LS_KEY);setScenarios(raw?JSON.parse(raw):[]);}catch{setScenarios([]);}}
  useEffect(()=>{loadScenarios();},[]);
  function saveList(list){localStorage.setItem(LS_KEY,JSON.stringify(list));setScenarios(list);}

  function saveScenario(){
    setSaveError("");const name=scenarioName.trim();
    if(!name){setSaveError("Please enter a name.");return;}
    const existing=scenarios.find(s=>s.name===name);
    if(existing){setSaveError("A scenario with that name already exists. Use Overwrite to replace it.");return;}
    const now=Date.now();
    const payload={...snap,anchor:toInp(anchor),mode,gran};
    saveList([...scenarios,{key:"sc:"+now,name,...payload,created:now,modified:now}]);
    setScName("");
  }
  function overwriteScenario(key){
    const now=Date.now();
    const payload={...snap,anchor:toInp(anchor),mode,gran};
    saveList(scenarios.map(s=>s.key===key?{...s,...payload,modified:now}:s));
  }
  function restoreScenario(sc){
    pushSnap({
      pcts:Array.isArray(sc.pcts)&&sc.pcts.length===PHASES.length?sc.pcts:[...DEFAULT_PCTS],
      trPos:sc.trPos||DEFAULT_TR.map(r=>r.pos),
      trVisible:sc.trVisible||DEFAULT_TR.map(()=>true),
      dbList:sc.dbList||makeDefaultDbList(),
      testBars:sc.testBars||initTestBars,
      anchor:frInp(sc.anchor),
      durDays:sc.durDays,
      launchWeeks:sc.launchWeeks||DEFAULT_LAUNCH_WK,
      sustainWeeks:sc.sustainWeeks||DEFAULT_SUSTAIN_WK,
      completed:sc.completed||{},
    });
    if(sc.mode)setMode(sc.mode);
    if(sc.gran)setGran(sc.gran);
  }
  function deleteScenario(key){saveList(scenarios.filter(s=>s.key!==key));}
  function renameScenario(key,newName){
    if(scenarios.find(s=>s.name===newName&&s.key!==key)){setSaveError("That name is already taken.");return;}
    saveList(scenarios.map(s=>s.key===key?{...s,name:newName,modified:Date.now()}:s));
  }

  function handleImportFile(e){
    const file=e.target.files?.[0];if(!file)return;
    setImportError("");setImportSuccess("");
    const reader=new FileReader();
    reader.onload=evt=>{
      try{
        const result=importCSV(evt.target.result,initSnap);
        if(!result){setImportError("Could not parse CSV.");return;}
        pushSnap(result.snap);setMode(result.mode||"forward");
        if(result.gran)setGran(result.gran);
        setImportSuccess("Imported!");setTimeout(()=>setImportSuccess(""),3000);
      }catch(err){setImportError("Import failed: "+err.message);}
    };
    reader.readAsText(file);e.target.value="";
  }

  function handleExportCSV(){
    exportCSVFull(snap,mode,gran,startDate,sopDate,launchEndDate,sustainEndDate,devDays,n,devPhaseStart,devPhaseEnd,devPhaseDate,dbList,trVisible,trPos,launchWeeks,sustainWeeks,testBars||[]);
  }

  async function handleExportPNG(){
    if(!timelineRef.current)return;
    try{
      const canvas=await html2canvas(timelineRef.current,{backgroundColor:isDark?"#0b1220":"#ffffff",scale:2,useCORS:true,logging:false});
      const url=canvas.toDataURL("image/png");
      const a=document.createElement("a");a.href=url;a.download="pdp_timeline.png";a.click();
    }catch(err){alert("PNG export failed: "+err.message);}
  }

  // Drag
  useEffect(()=>{
    function onMove(e){
      const d=drag.current;if(!d)return;
      const rect=timelineRef.current?.getBoundingClientRect();if(!rect)return;
      const dx=(e.clientX-d.x0)/rect.width;
      const base=dragSnap.current,bn=normP(base.pcts);
      let next=null;
      if(d.type==="phase"){const sum=base.pcts.reduce((a,b)=>a+b,0);if(modeRef.current==="both"){const delta=dx/dspDevFrac*sum,min=sum*0.02;const nA=d.p0[d.idx]+delta,nB=d.p0[d.idx+1]-delta;if(nA>=min&&nB>=min){const np=[...d.p0];np[d.idx]=nA;np[d.idx+1]=nB;next={...base,pcts:np};}}else{const deltaDays=(dx/dspDevFrac)*base.durDays;const newDurDays=base.durDays+deltaDays;const minDays=base.durDays*0.02;if(newDurDays>minDays){const np=d.p0.map((p,i)=>i===d.idx?(p/sum*base.durDays+deltaDays)*sum/newDurDays:p*base.durDays/newDurDays);if(np.every(v=>v>0)){next={...base,pcts:np,durDays:newDurDays};}}}}
      else if(d.type==="tr"){const phW=dspDevFrac*bn[d.phase];const np=[...base.trPos];np[d.trIdx]=clamp(d.pos0+dx/phW,0.02,0.98);next={...base,trPos:np};}
      else if(d.type==="build-left"){const phW=dspDevFrac*bn[d.phase];next={...base,dbList:base.dbList.map(b=>b.key===d.bKey?{...b,s:clamp(d.s0+dx/phW,0.01,d.e0-0.05)}:b)};}
      else if(d.type==="build-right"){const phW=dspDevFrac*bn[d.phase];next={...base,dbList:base.dbList.map(b=>b.key===d.bKey?{...b,e:clamp(d.e0+dx/phW,d.s0+0.05,0.99)}:b)};}
      else if(d.type==="build-body"){const phW=dspDevFrac*bn[d.phase];const span=d.e0-d.s0,newS=clamp(d.s0+dx/phW,0.01,0.99-span);next={...base,dbList:base.dbList.map(b=>b.key===d.bKey?{...b,s:newS,e:newS+span}:b)};}
      else if(d.type==="test-left"){const phW=dspDevFrac*bn[d.phase];next={...base,testBars:base.testBars.map(b=>b.key===d.bKey?{...b,s:clamp(d.s0+dx/phW,0.01,d.e0-0.05)}:b)};}
      else if(d.type==="test-right"){const phW=dspDevFrac*bn[d.phase];next={...base,testBars:base.testBars.map(b=>b.key===d.bKey?{...b,e:clamp(d.e0+dx/phW,d.s0+0.05,4.0)}:b)};}
      else if(d.type==="test-body"){const phW=dspDevFrac*bn[d.phase];const span=d.e0-d.s0,newS=clamp(d.s0+dx/phW,0.01,4.0-span);next={...base,testBars:base.testBars.map(b=>b.key===d.bKey?{...b,s:newS,e:newS+span}:b)};}
      if(next){liveSnap.current=next;}
      forceUpdate(x=>x+1);
    }
    function onUp(){if(liveSnap.current)pushSnap(liveSnap.current);drag.current=null;liveSnap.current=null;dragSnap.current=null;forceUpdate(x=>x+1);}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
  },[dspDevFrac,n,snap]);

  function startPhaseDrag(e,idx){e.preventDefault();dragSnap.current=snap;drag.current={type:"phase",idx,x0:e.clientX,p0:[...pcts]};}
  function startTrDrag(e,ti){e.preventDefault();dragSnap.current=snap;drag.current={type:"tr",trIdx:ti,phase:DEFAULT_TR[ti].phase,x0:e.clientX,pos0:trPos[ti]};}
  function startBuildDrag(e,bKey,side,b){e.preventDefault();dragSnap.current=snap;drag.current={type:"build-"+side,bKey,phase:b.phase,x0:e.clientX,s0:b.s,e0:b.e};}
  function startTestDrag(e,bKey,side,b){e.preventDefault();dragSnap.current=snap;drag.current={type:"test-"+side,bKey,phase:b.phase,x0:e.clientX,s0:b.s,e0:b.e};}

  useEffect(()=>{

        <div>

            startDate={startDate} handleStartDate={handleStartDate}
            sopDate={sopDate} handleSopDate={handleSopDate}
            gran={gran} setGran={setGran}
            actYrBtn={actYrBtn} setDurDays={setDurDays}
            devDays={devDays}
          />

          <TimelinePanel
            t={t} isDark={isDark} box={box} timelineRef={timelineRef} rowLbl={rowLbl}
            ticks={ticks} dspDevFrac={dspDevFrac} dspLaunchFrac={dspLaunchFrac}
            todayDispFrac={todayDispFrac} showToday={showToday} showG7={showG7} truncated={truncated}
            startDate={startDate} displayEndDate={displayEndDate} sopDate={sopDate} launchEndDate={launchEndDate}
            planningEnd={planningEnd} developEnd={developEnd}
            n={n} st={st} devDays={devDays} prodDispItems={prodDispItems}
            dbList={dbList} testBars={testBars} trVisible={trVisible} trPos={trPos}
            devPhaseDate={devPhaseDate} devPhaseStart={devPhaseStart} devPhaseEnd={devPhaseEnd} dspDevPos={dspDevPos}
            getLabelForBar={getLabelForBar}
            startPhaseDrag={startPhaseDrag} startTrDrag={startTrDrag}
            startBuildDrag={startBuildDrag} startTestDrag={startTestDrag}
            deleteDb={deleteDb} splitDb={splitDb} deleteTr={deleteTr} deleteTestBar={deleteTestBar}
            completed={completed||{}} toggleComplete={toggleComplete}
            hiddenRows={hiddenRows} toggleRow={toggleRow}
            showTodayLine={showTodayLine} toggleTodayLine={()=>setShowTodayLine(v=>!v)}
          />

          {/* Phase Schedule */}
          <div style={{...box,padding:"16px 20px"}}>
            <div style={{fontSize:13,color:t.textMuted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:0.4}}>Phase Schedule</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:10,paddingBottom:2,marginBottom:2}}>
              <div style={{width:COL_SWATCH,flexShrink:0}}/><div style={{...thStyle,width:COL_PHASE,flexShrink:0}}>Phase</div>
              <div style={{...thStyle,width:COL_DATES,flexShrink:0}}>Start → End</div><div style={{...thStyle,flexGrow:1}}/>
              <div style={{...thStyle,width:COL_WK,flexShrink:0}}>Duration</div><div style={{width:COL_SEP,flexShrink:0}}/>
              <div style={{...thStyle,width:COL_PCT,flexShrink:0}}>% of Dev</div>
            </div>
            {n.map((p,i)=>{const phase=PHASES[i];if(!phase)return null;
              const phS=devPhaseStart(i),phE=devPhaseEnd(i);
              const wks=Math.round(p*devDays/7),pct=parseFloat((p*100).toFixed(1));
              const maxWks=Math.max(1,Math.floor((devDays/7)*0.95));
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",borderBottom:"1px solid "+t.border}}>
                  <div style={{width:COL_SWATCH,height:10,backgroundColor:phase.color,borderRadius:2,flexShrink:0}}/>
                  <span style={{fontSize:13,fontWeight:700,color:t.text,width:COL_PHASE,flexShrink:0}}>Ph{i} {phase.name}</span>
                  <div style={{display:"flex",alignItems:"center",gap:6,width:COL_DATES,flexShrink:0}}>
                    <DateCell date={phS} onChange={v=>setPhaseStartDate(i,v)} t={t} isDark={isDark}/>
                    <span style={{color:t.textMuted,fontSize:13}}>→</span>
                    <DateCell date={phE} onChange={v=>setPhaseEndDate(i,v)} t={t} isDark={isDark} readOnly={i===PHASES.length-1}/>
                  </div>
                  <div style={{flexGrow:1}}/>
                  <div style={{width:COL_WK,flexShrink:0}}><EditCell value={wks} onCommit={v=>setPhaseWeeks(i,Math.min(v,maxWks))} width={72} suffix="wk" t={t}/></div>
                  <span style={{fontSize:16,color:t.textDim,fontWeight:200,width:COL_SEP,flexShrink:0,textAlign:"center"}}>/</span>
                  <div style={{width:COL_PCT,flexShrink:0}}><EditCell value={pct} onCommit={v=>setPhasePercent(i,v)} width={60} suffix="%" t={t}/></div>
                </div>
              );
            })}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0 5px",borderBottom:"1px solid "+t.border}}>
              <div style={{width:COL_SWATCH,height:10,backgroundColor:t.sop,borderRadius:"50%",flexShrink:0}}/>
              <span style={{fontSize:12,fontWeight:700,color:t.sop}}>G6 — Start of Production (SOP): {fmtD(sopDate)}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",borderBottom:"1px solid "+t.border}}>
              <div style={{width:COL_SWATCH,height:10,backgroundColor:PROD_PHASES[0].color,borderRadius:2,flexShrink:0}}/>
              <span style={{fontSize:13,fontWeight:700,color:t.text,width:COL_PHASE,flexShrink:0}}>Ph7 Launch</span>
              <div style={{display:"flex",alignItems:"center",gap:6,width:COL_DATES,flexShrink:0}}>
                <DateCell date={sopDate} t={t} isDark={isDark} readOnly/>
                <span style={{color:t.textMuted,fontSize:13}}>→</span>
                <DateCell date={launchEndDate} onChange={v=>{const d=frInp(v);setLaunchWk(Math.max(4,Math.round((d-sopDate)/864e5/7)));}} t={t} isDark={isDark}/>
              </div>
              <div style={{flexGrow:1}}/>
              <div style={{width:COL_WK,flexShrink:0}}><EditCell value={launchWeeks} onCommit={v=>setLaunchWk(Math.max(4,Math.round(v)))} width={72} suffix="wk" t={t}/></div>
              <span style={{fontSize:16,color:t.textDim,fontWeight:200,width:COL_SEP,flexShrink:0,textAlign:"center"}}>/</span>
              <div style={{width:COL_PCT,flexShrink:0}}><span style={{fontSize:13,color:t.textDim,padding:"5px 0"}}>—</span></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0"}}>
              <div style={{width:COL_SWATCH,height:10,backgroundColor:PROD_PHASES[1].color,borderRadius:2,flexShrink:0}}/>
              <span style={{fontSize:13,fontWeight:700,color:t.text,width:COL_PHASE,flexShrink:0}}>Ph8 Sustain</span>
              <div style={{display:"flex",alignItems:"center",gap:6,width:COL_DATES,flexShrink:0}}>
                <DateCell date={launchEndDate} onChange={v=>{const d=frInp(v);setLaunchWk(Math.max(4,Math.round((d-sopDate)/864e5/7)));}} t={t} isDark={isDark}/>
                <span style={{color:t.textMuted,fontSize:13}}>→</span>
                <DateCell date={sustainEndDate} onChange={v=>{const d=frInp(v);setSustainWk(Math.max(4,Math.round((d-launchEndDate)/864e5/7)));}} t={t} isDark={isDark}/>
              </div>
              <div style={{flexGrow:1}}/>
              <div style={{width:COL_WK,flexShrink:0}}><EditCell value={sustainWeeks} onCommit={v=>setSustainWk(Math.max(4,Math.round(v)))} width={72} suffix="wk" t={t}/></div>
              <span style={{fontSize:16,color:t.textDim,fontWeight:200,width:COL_SEP,flexShrink:0,textAlign:"center"}}>/</span>
              <div style={{width:COL_PCT,flexShrink:0}}><span style={{fontSize:13,color:t.textDim,padding:"5px 0"}}>—</span></div>
            </div>
          </div>

          <ScenarioTable scenarios={scenarios} loading={false} saveError={saveError} setSaveError={setSaveError}
            scenarioName={scenarioName} setScenarioName={setScName}
            onSave={saveScenario} onOverwrite={overwriteScenario}
            onRestore={restoreScenario} onDelete={deleteScenario} onRename={renameScenario}
            t={t} isDark={isDark} showSaveForm={true}/>
        </div>
      )}
    </div>
  );
}

// ── ControlsBar ───────────────────────────────────────────────────────────────
function ControlsBar({t,isDark,box,btn,inpS,mode,toggleFixed,startDate,handleStartDate,
  sopDate,handleSopDate,gran,setGran,actYrBtn,setDurDays,devDays}){
  const fixStart=mode==="forward"||mode==="both";
  const fixSOP=mode==="backward"||mode==="both";
  return(
    <div style={{...box,padding:"16px 20px"}}>
      <div style={{fontSize:13,color:t.textMuted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:0.4}}>Setup</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:"10px 20px",alignItems:"flex-end"}}>
      <div>
        <div style={{fontSize:12,color:t.textMuted,marginBottom:4,fontWeight:600}}>Scheduling Mode <span style={{fontWeight:400}}>(Select One or Both)</span></div>
        <div style={{display:"flex",gap:6}}>
          {[{which:"start",lbl:fixStart?"Fixed Start":"Floating Start",active:fixStart},{which:"sop",lbl:fixSOP?"Fixed SOP":"Floating SOP",active:fixSOP}].map(item=>(
            <button key={item.which} onClick={()=>toggleFixed(item.which)}
              style={{padding:"5px 12px",borderRadius:5,border:"1px solid "+(item.active?t.btnAct:t.border),cursor:"pointer",fontSize:13,fontWeight:700,
                background:item.active?t.btnAct:t.btnBg,color:item.active?"#fff":t.btnText,transition:"all 0.15s",
                minWidth:116,textAlign:"center"}}>
              {item.lbl}
            </button>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:12,marginBottom:4,fontWeight:600,color:fixStart?"#3a7ad0":t.textMuted}}>
          Start Date <span style={{visibility:fixStart?"visible":"hidden"}}>⚓</span>
        </div>
        <input type="date" value={toInp(startDate)} onChange={e=>handleStartDate(e.target.value)} style={inpS(!fixStart)}/>
      </div>
      <div>
        <div style={{fontSize:12,color:t.textMuted,marginBottom:4,fontWeight:600}}>Template Durations</div>
        <div style={{display:"flex",gap:4}}>
          {[1,2,3,4,5].map(y=>(
            <button key={y} onClick={()=>setDurDays(Math.round(365.25*y))} style={btn(actYrBtn===y,true)}>{y}yr</button>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:12,marginBottom:4,fontWeight:600,color:fixSOP?"#3a7ad0":t.textMuted}}>
          SOP Date (G6) <span style={{visibility:fixSOP?"visible":"hidden"}}>⚓</span>
        </div>
        <input type="date" value={toInp(sopDate)} onChange={e=>handleSopDate(e.target.value)} style={inpS(!fixSOP)}/>
      </div>
      <div>
        <div style={{fontSize:12,color:t.textMuted,marginBottom:4,fontWeight:600}}>Timeline Scale</div>
        <div style={{display:"flex",gap:4}}>
          {["Monthly","Quarterly","Yearly"].map(g=>(
            <button key={g} onClick={()=>setGran(g.toLowerCase())} style={btn(gran===g.toLowerCase(),true)}>{g}</button>
          ))}
        </div>
      </div>
      <div style={{marginLeft:"auto",textAlign:"right"}}>
        <div style={{fontSize:11,color:t.textMuted}}>Development</div>
        <div style={{fontSize:16,fontWeight:800}}>{fmtW(devDays/7)}</div>
        <div style={{fontSize:10,color:t.textDim}}>SOP: {fmtD(sopDate)}</div>
      </div>
    </div>
    </div>
  );
}

// ── TimelinePanel ─────────────────────────────────────────────────────────────
function TimelinePanel({t,isDark,box,timelineRef,rowLbl,ticks,dspDevFrac,dspLaunchFrac,
  todayDispFrac,showToday,showG7,truncated,startDate,displayEndDate,sopDate,launchEndDate,
  planningEnd,developEnd,n,st,devDays,prodDispItems,dbList,testBars,trVisible,trPos,
  devPhaseDate,devPhaseStart,devPhaseEnd,dspDevPos,getLabelForBar,
  startPhaseDrag,startTrDrag,startBuildDrag,startTestDrag,
  deleteDb,splitDb,deleteTr,deleteTestBar,completed,toggleComplete,hiddenRows,toggleRow,showTodayLine,toggleTodayLine}){
  const legendBg=isDark?"rgba(255,255,255,0.03)":"#f0f2f5";
  return(
    <div style={{...box,padding:"20px 22px"}}>
      <div style={{fontSize:13,color:t.textMuted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:0.4}}>Timeline</div>
      {/* PNG capture target */}
      <div ref={timelineRef} style={{position:"relative",width:"100%",background:isDark?t.bg:"#ffffff",padding:"4px 0"}}>
        {/* Section labels with color accent top-borders + downward bracket ticks */}
        <div style={{display:"flex",height:22,marginBottom:4,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>
          <div style={{position:"relative",width:pc(planningEnd),display:"flex",alignItems:"center",justifyContent:"center",borderRight:"1px solid "+t.border,borderTop:"2px solid rgba(193,78,40,0.75)",overflow:"hidden",flexShrink:0,color:"rgba(193,78,40,0.9)"}}>
            Planning (Ph0–Ph2)
            <div style={{position:"absolute",left:0,top:0,width:2,height:8,background:"rgba(193,78,40,0.75)"}}/>
            <div style={{position:"absolute",right:0,top:0,width:2,height:8,background:"rgba(193,78,40,0.75)"}}/>
          </div>
          <div style={{position:"relative",width:pc(developEnd-planningEnd),display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0,borderRight:"2px dashed "+t.sop,borderTop:"2px solid rgba(20,143,119,0.8)",color:"rgba(20,143,119,0.95)"}}>
            Development (Ph3–Ph6)
            <div style={{position:"absolute",left:0,top:0,width:2,height:8,background:"rgba(20,143,119,0.8)"}}/>
            <div style={{position:"absolute",right:-1,top:0,width:2,height:8,background:"rgba(20,143,119,0.8)"}}/>
          </div>
          <div style={{position:"relative",flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",borderTop:"2px solid rgba(26,82,118,0.7)",color:"rgba(26,82,118,0.9)"}}>
            Production
            <div style={{position:"absolute",left:0,top:0,width:2,height:8,background:"rgba(26,82,118,0.7)"}}/>
            <div style={{position:"absolute",right:0,top:0,width:2,height:8,background:"rgba(26,82,118,0.7)"}}/>
          </div>
        </div>

        {/* Ruler */}
        {(()=>{
          // Prevent Today label from overlapping start/end date text or G6/SOP label
          const nearLeft=todayDispFrac<0.08;
          const nearRight=todayDispFrac>0.92;
          const nearSop=Math.abs(todayDispFrac-dspDevFrac)<0.05;
          const todayLblTx=nearLeft?"translateX(4px)":nearRight?"translateX(calc(-100% - 4px))":nearSop?(todayDispFrac<dspDevFrac?"translateX(calc(-100% - 4px))":"translateX(4px)"):"translateX(-50%)";
          return(
          <div style={{position:"relative",height:48,marginBottom:6}}>
            <div style={{position:"absolute",top:0,left:0,fontSize:12,color:t.rulerMajTx,fontWeight:700,whiteSpace:"nowrap"}}>{fmtD(startDate)}</div>
            <div style={{position:"absolute",top:0,right:0,fontSize:12,color:t.rulerMajTx,fontWeight:700,whiteSpace:"nowrap"}}>
              {fmtD(displayEndDate)}{truncated&&<span style={{fontSize:10,color:t.sop}}> +</span>}
            </div>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:1,background:t.rulerLine}}/>
            {ticks.map((tk,i)=>(
              <div key={i} style={{position:"absolute",left:pc(tk.x),transform:"translateX(-50%)",bottom:0,display:"flex",flexDirection:"column",alignItems:"center",zIndex:1}}>
                {tk.label&&<span style={{fontSize:10,color:tk.major?t.rulerMajTx:t.rulerMinTx,whiteSpace:"nowrap",marginBottom:2,fontWeight:tk.major?700:400}}>{tk.label}</span>}
                <div style={{width:1,height:tk.major?12:6,background:tk.major?t.rulerMajTk:t.rulerMinTk}}/>
              </div>
            ))}
            <div style={{position:"absolute",left:pc(dspDevFrac),top:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",zIndex:6,transform:"translateX(-1px)"}}>
              <span style={{fontSize:11,color:t.sop,whiteSpace:"nowrap",fontWeight:800,position:"absolute",top:0,left:"50%",transform:"translateX(-50%)"}}>G6 / SOP</span>
              <div style={{position:"absolute",bottom:0,width:2,height:16,background:t.sop}}/>
            </div>
            {showToday&&showTodayLine&&(
              <div style={{position:"absolute",left:pc(todayDispFrac),top:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",zIndex:10,transform:"translateX(-1px)"}}>
                <span style={{fontSize:11,color:"#e74c3c",whiteSpace:"nowrap",fontWeight:800,position:"absolute",top:0,left:0,transform:todayLblTx}}>Today</span>
                <div style={{position:"absolute",bottom:0,width:2,height:14,background:"#e74c3c"}}/>
              </div>
            )}
          </div>
          );
        })()}

        {/* Timeline rows */}
        <div style={{position:"relative"}}>
          {/* Gridlines in isolated clipping layer so tooltips can overflow */}
          <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
            {ticks.map((tk,i)=>(
              <div key={"gl-"+i} style={{position:"absolute",left:pc(tk.x),top:0,bottom:0,width:1,background:t.gridLine}}/>
            ))}
            <div style={{position:"absolute",left:pc(dspDevFrac),top:0,bottom:0,width:0,borderLeft:"2px dashed "+t.sop,zIndex:4,transform:"translateX(-1px)"}}/>
            {showToday&&showTodayLine&&<div style={{position:"absolute",left:pc(todayDispFrac),top:0,bottom:0,width:0,borderLeft:"2px dashed rgba(231,76,60,0.8)",zIndex:46,transform:"translateX(-1px)"}}/>}
          </div>

          {/* Phase blocks */}
          <div style={{display:"flex",height:64,position:"relative",overflow:"visible",borderBottom:"1px solid "+t.gridLine}}>
            {n.map((p,i)=>{const phase=PHASES[i];if(!phase)return null;
              const ckey="ph-"+i;
              return(
                <PhaseBlock key={i} phase={phase} idx={i} p={p} dspDevFrac={dspDevFrac} t={t}
                  devPhaseStart={devPhaseStart} devPhaseEnd={devPhaseEnd} devDays={devDays}
                  onDragStart={i<n.length-1?e=>startPhaseDrag(e,i):null}
                  completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>
              );})}
            {prodDispItems.map(item=>(
              <div key={item.ph.id} style={{width:pc(item.w),backgroundColor:item.ph.color,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",borderLeft:"2px solid "+t.bg,overflow:"hidden",flexShrink:0}}>
                <div style={{textAlign:"center",pointerEvents:"none",padding:"0 4px"}}>
                  <div style={{fontSize:item.w>0.07?14:12,fontWeight:800,color:t.phTx,whiteSpace:"nowrap"}}>Ph{item.ph.id}</div>
                  {item.w>0.075&&<div style={{fontSize:11,color:t.phSub,marginTop:1,whiteSpace:"nowrap"}}>{item.ph.name}</div>}
                  {item.w>0.09&&<div style={{fontSize:10,color:t.phDim,marginTop:1}}>{fmtW(item.wks)}</div>}
                </div>
              </div>
            ))}
          </div>

          {/* Phase Exit Gate Reviews */}
          {!hiddenRows.gates&&<div style={{position:"relative",height:74,marginTop:2,overflow:"visible",borderBottom:"1px solid "+t.gridLine}}>
            <span style={rowLbl}>Phase Exit Gate Reviews</span>
            {n.map((_,i)=>{const x=dspDevFrac*(st[i]+n[i]);const ckey="gate-"+i;return<Diamond key={i} x={x} label={"G"+i}
              sub={i===6?"SOP":i===5?"Model Fix":undefined} color={GATE_COLOR} sz={i===6?15:11}
              tc={t.milTx} sc={t.milSub} date={devPhaseDate(i,1)} desc={GATE_DESC[i]} t={t}
              completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;}) }
            {showG7&&(()=>{const ckey="gate-7";return<Diamond x={dspDevFrac+dspLaunchFrac} label="G7" color={GATE_COLOR} sz={11} tc={t.milTx} sc={t.milSub} date={launchEndDate} desc={GATE_DESC[7]} t={t} completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;})()}
          </div>}

          {/* Tech Reviews */}
          {!hiddenRows.reviews&&<div style={{position:"relative",height:74,marginTop:2,overflow:"visible",borderBottom:"1px solid "+t.gridLine}}>
            <span style={rowLbl}>Program Tech Reviews</span>
            {DEFAULT_TR.map((tr,i)=>{if(!trVisible[i])return null;const x=dspDevPos(tr.phase,trPos[i]);const ckey="tr-"+tr.id;
              return<Diamond key={tr.id} x={x} label={tr.id} color={TR_COLOR} sz={12}
                tc={t.milTx} sc={t.milSub} date={devPhaseDate(tr.phase,trPos[i])} desc={tr.desc} t={t}
                onDragStart={e=>startTrDrag(e,i)} onDelete={()=>deleteTr(i)}
                completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;}) }
          </div>}

          {/* Robot Builds */}
          {!hiddenRows.builds&&<div style={{position:"relative",height:BUILD_BAR_H+28,marginTop:2,overflow:"visible",borderBottom:"1px solid "+t.gridLine}}>
            <span style={rowLbl}>Robot Builds</span>
            {dbList.map(b=>{const x1=dspDevPos(b.phase,b.s),x2=dspDevPos(b.phase,b.e),lbl=getLabelForBar(b,dbList);const ckey="build-"+b.key;
              return<DragBar key={b.key} x1={x1} x2={x2} label={lbl}
                dateStart={devPhaseDate(b.phase,b.s)} dateEnd={devPhaseDate(b.phase,b.e)} t={t} isDark={isDark}
                onDragLeft={e=>startBuildDrag(e,b.key,"left",b)}
                onDragRight={e=>startBuildDrag(e,b.key,"right",b)}
                onDragBody={e=>startBuildDrag(e,b.key,"body",b)}
                onDelete={()=>deleteDb(b.key)} onSplit={()=>splitDb(b.key)}
                completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;}) }
          </div>}

          {/* Testing */}
          {!hiddenRows.testing&&<div style={{position:"relative",height:BUILD_BAR_H+28,marginTop:2,overflow:"visible"}}>
            <span style={rowLbl}>Testing</span>
            {(testBars||[]).map(b=>{const x1=dspDevPos(b.phase,b.s),x2=dspDevPos(b.phase,b.e);const ckey="test-"+b.key;
              return<DragBar key={b.key} x1={x1} x2={x2} label={b.id}
                dateStart={devPhaseDate(b.phase,b.s)} dateEnd={devPhaseDate(b.phase,b.e)}
                t={t} isDark={isDark} barColor="#5b6abf"
                onDragLeft={e=>startTestDrag(e,b.key,"left",b)}
                onDragRight={e=>startTestDrag(e,b.key,"right",b)}
                onDragBody={e=>startTestDrag(e,b.key,"body",b)}
                onDelete={()=>deleteTestBar(b.key)}
                completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;}) }
          </div>}
        </div>

        {/* Bottom ruler — duplicate scale, labels below ticks */}
        <div style={{position:"relative",height:44,marginTop:2}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:t.rulerLine}}/>
          {ticks.map((tk,i)=>(
            <div key={"br-"+i} style={{position:"absolute",left:pc(tk.x),transform:"translateX(-50%)",top:0,display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:1,height:tk.major?10:5,background:tk.major?t.rulerMajTk:t.rulerMinTk}}/>
              {tk.label&&<span style={{fontSize:10,color:tk.major?t.rulerMajTx:t.rulerMinTx,whiteSpace:"nowrap",marginTop:2,fontWeight:tk.major?700:400}}>{tk.label}</span>}
            </div>
          ))}
          <div style={{position:"absolute",left:pc(dspDevFrac),top:0,width:2,height:10,background:t.sop,zIndex:4,transform:"translateX(-1px)"}}/>
          {showToday&&showTodayLine&&<div style={{position:"absolute",left:pc(todayDispFrac),top:0,width:2,height:10,background:"#e74c3c",zIndex:10,transform:"translateX(-1px)"}}/>}
        </div>

      </div>

      {/* Legend + instructions row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginTop:10,gap:12,flexWrap:"wrap"}}>
        <div style={{position:"relative",border:"1px solid "+t.border,borderRadius:6,padding:"10px 14px 8px",background:legendBg}}>
          <div style={{position:"absolute",top:-9,left:10,padding:"0 5px",background:legendBg,fontSize:10,color:t.textDim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.6px"}}>Legend · Click to show/hide</div>
          <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
            <LegendItem shape="diamond" color={GATE_COLOR} label="Gate Review" tc={t.textMuted} onClick={()=>toggleRow("gates")} hidden={hiddenRows.gates}/>
            <LegendItem shape="diamond" color={TR_COLOR}   label="Tech Review"  tc={t.textMuted} onClick={()=>toggleRow("reviews")} hidden={hiddenRows.reviews}/>
            <LegendItem shape="bar"     color="#b94a08"    label="Robot Build"  tc={t.textMuted} onClick={()=>toggleRow("builds")} hidden={hiddenRows.builds}/>
            <LegendItem shape="bar"     color="#5b6abf"    label="Testing"      tc={t.textMuted} onClick={()=>toggleRow("testing")} hidden={hiddenRows.testing}/>
            {showToday&&<LegendItem shape="bar" color="#e74c3c" label="Today" tc={t.textMuted} onClick={toggleTodayLine} hidden={!showTodayLine}/>}
          </div>
        </div>
        <div style={{position:"relative",border:"1px solid "+t.border,borderRadius:6,padding:"10px 14px 8px",background:legendBg}}>
          <div style={{position:"absolute",top:-9,left:10,padding:"0 5px",background:legendBg,fontSize:10,color:t.textDim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.6px"}}>Tips</div>
          <div style={{fontSize:11,color:t.textMuted,lineHeight:1.7,whiteSpace:"nowrap"}}>
            Drag bars &amp; milestones to reposition · Hover for details &amp; options
          </div>
        </div>
      </div>
    </div>
  );
}

// Phase block with hover tooltip
function PhaseBlock({phase,idx,p,dspDevFrac,t,devPhaseStart,devPhaseEnd,devDays,onDragStart,completed,onToggleComplete}){
  const[hov,setHov]=useState(false);const timer=useRef(null);const showTimer=useRef(null);
  function enter(){clearTimeout(timer.current);clearTimeout(showTimer.current);showTimer.current=setTimeout(()=>setHov(true),350);}
  function leave(){clearTimeout(showTimer.current);timer.current=setTimeout(()=>setHov(false),150);}
  useEffect(()=>()=>{clearTimeout(timer.current);clearTimeout(showTimer.current);},[]);
  return(
    <div style={{width:pc(p*dspDevFrac),backgroundColor:phase.color,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"visible",flexShrink:0,zIndex:hov?20:1}}
      onMouseEnter={enter} onMouseLeave={leave}>
      <div style={{textAlign:"center",pointerEvents:"none",padding:"0 4px",position:"relative",zIndex:2}}>
        <div style={{fontSize:p>0.07?14:12,fontWeight:800,color:t.phTx,whiteSpace:"nowrap"}}>Ph{idx}</div>
        {p>0.075&&<div style={{fontSize:11,color:t.phSub,marginTop:1,whiteSpace:"nowrap"}}>{phase.name}</div>}
        {p>0.09&&<div style={{fontSize:10,color:t.phDim,marginTop:1}}>{fmtW(Math.round(p*devDays/7))}</div>}
      </div>
      {completed&&<div style={{position:"absolute",top:4,right:4,zIndex:30,width:14,height:14,borderRadius:"50%",background:"#27ae60",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.35)"}}>
        <svg width={9} height={9} viewBox="0 0 9 9"><polyline points="1.5,4.5 3.5,6.5 7.5,2" stroke="#fff" strokeWidth={1.8} fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>}
      {onDragStart&&<div onMouseDown={onDragStart} style={{position:"absolute",right:0,top:0,bottom:0,width:10,cursor:"ew-resize",zIndex:25}}/>}
      {hov&&<PhaseTooltip phase={phase} idx={idx} startDate={devPhaseStart(idx)} endDate={devPhaseEnd(idx)} pct={p} devDays={devDays} t={t} completed={completed} onToggleComplete={onToggleComplete}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
