            })}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0 5px",borderBottom:"1px solid "+t.border}}>
              <div style={{width:COL_SWATCH,height:10,backgroundColor:t.sop,borderRadius:"50%",flexShrink:0}}/>
              <span style={{fontSize:12,fontWeight:700,color:t.sop}}>G6 — Start of Production (SOP): {fmtD(sopDate)}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",borderBottom:"1px solid "+t.border}}>
              <div style={{width:COL_SWATCH,height:10,backgroundColor:PROD_PHASES[0].color,borderRadius:2,flexShrink:0}}/>
              <span style={{fontSize:13,fontWeight:700,color:t.text,width:COL_PHASE,flexShrink:0}}>Ph7 Launch</span>
              <div style={{display:"flex",alignItems:"center",gap:6,width:COL_DATES,flexShrink:0}}>
                <DateCell date={sopDate} t={t} isDark={isDark} readOnly/>
                <span style={{color:t.textMuted,fontSize:13}}>→</span>
                <DateCell date={launchEndDate} onChange={v=>{const d=frInp(v);setLaunchWk(Math.max(4,Math.round((d-sopDate)/864e5/7)));}} t={t} isDark={isDark}/>
              </div>
              <div style={{flexGrow:1}}/>
              <div style={{width:COL_WK,flexShrink:0}}><EditCell value={launchWeeks} onCommit={v=>setLaunchWk(Math.max(4,Math.round(v)))} width={72} suffix="wk" t={t}/></div>
              <span style={{fontSize:16,color:t.textDim,fontWeight:200,width:COL_SEP,flexShrink:0,textAlign:"center"}}>/</span>
              <div style={{width:COL_PCT,flexShrink:0}}><span style={{fontSize:13,color:t.textDim,padding:"5px 0"}}>—</span></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0"}}>
              <div style={{width:COL_SWATCH,height:10,backgroundColor:PROD_PHASES[1].color,borderRadius:2,flexShrink:0}}/>
              <span style={{fontSize:13,fontWeight:700,color:t.text,width:COL_PHASE,flexShrink:0}}>Ph8 Sustain</span>
              <div style={{display:"flex",alignItems:"center",gap:6,width:COL_DATES,flexShrink:0}}>
                <DateCell date={launchEndDate} onChange={v=>{const d=frInp(v);setLaunchWk(Math.max(4,Math.round((d-sopDate)/864e5/7)));}} t={t} isDark={isDark}/>
                <span style={{color:t.textMuted,fontSize:13}}>→</span>
                <DateCell date={sustainEndDate} onChange={v=>{const d=frInp(v);setSustainWk(Math.max(4,Math.round((d-launchEndDate)/864e5/7)));}} t={t} isDark={isDark}/>
              </div>
              <div style={{flexGrow:1}}/>
              <div style={{width:COL_WK,flexShrink:0}}><EditCell value={sustainWeeks} onCommit={v=>setSustainWk(Math.max(4,Math.round(v)))} width={72} suffix="wk" t={t}/></div>
              <span style={{fontSize:16,color:t.textDim,fontWeight:200,width:COL_SEP,flexShrink:0,textAlign:"center"}}>/</span>
              <div style={{width:COL_PCT,flexShrink:0}}><span style={{fontSize:13,color:t.textDim,padding:"5px 0"}}>—</span></div>
            </div>
            </div></div>
            </>}
          </div>

          {compareBarShown&&(
            <div key={compareBarExiting?"exit":"enter"} style={{overflow:"hidden",animation:compareBarExiting?"compareBarOut 320ms ease-in forwards":"compareBarIn 450ms ease-out"}} onAnimationEnd={e=>{if(compareBarExiting){setCompareBarShown(false);setCompareBarExiting(false);compareBarWasShown.current=false;}}}>

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:isDark?"#0e1e35":"#eef4ff",border:"2px solid #3b82f6",borderRadius:7,padding:"10px 14px",marginBottom:12,gap:12,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",minWidth:0}}>
                <button onClick={()=>{clearCompareIds();setConfirmDelBar(false);}} title="Clear selection" style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:t.textMuted,padding:"0 2px",lineHeight:1,flexShrink:0}}>×</button>
                <span style={{fontSize:13,color:t.text,fontWeight:600,flexShrink:0}}>{compareDisplayIds.current.size} selected</span>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {[...compareDisplayIds.current].map((id,i)=>{const sc=[...scenarios,...sharedScenarios].find(s=>s.key===id);return sc?<span key={id} style={{fontSize:11,background:COMPARE_ACCENTS[i]+"22",color:COMPARE_ACCENTS[i],border:"1px solid "+COMPARE_ACCENTS[i]+"55",borderRadius:4,padding:"1px 7px",fontWeight:700,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sc.name}</span>:null;})}
                </div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                {confirmDelBar?(<>
                  <span style={{fontSize:12,color:t.dangerText,fontWeight:600,whiteSpace:"nowrap"}}>Delete {compareInMineScs.length} scenario{compareInMineScs.length!==1?"s":""}?</span>
                  <button onClick={()=>{bulkDeleteScenarios(new Set(compareInMineScs.map(s=>s.key)));setConfirmDelBar(false);}} style={{padding:"5px 12px",borderRadius:5,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:t.dangerText,color:"#fff"}}>Confirm</button>
                  <button onClick={()=>setConfirmDelBar(false)} style={{padding:"5px 12px",borderRadius:5,border:"1px solid "+t.border,cursor:"pointer",fontWeight:600,fontSize:12,background:t.btnBg,color:t.btnText}}>Cancel</button>
                </>):(<>
                  {compareDisplayIds.current.size>=2&&<button onClick={()=>setCompareView(true)} style={{padding:"5px 16px",borderRadius:5,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:"#3b82f6",color:"#fff",flexShrink:0,display:"flex",alignItems:"center",gap:5}}>Compare <span style={{fontSize:15,lineHeight:1}}>›</span></button>}
                  {scenarios.some(s=>compareDisplayIds.current.has(s.key))&&<button onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setCompareMenuPos({x:r.right,y:r.bottom+4});}} style={{padding:"5px 10px",borderRadius:5,border:"1px solid "+t.border,cursor:"pointer",fontWeight:700,fontSize:13,background:t.btnBg,color:t.btnText,display:"inline-flex",alignItems:"center",lineHeight:1}}>⋮</button>}
                </>)}
              </div>
            </div>
            </div>
          )}
          <ScenarioTable scenarios={scenarios} loading={scenariosLoading} saveError={saveError} setSaveError={setSaveError}
            scenarioName={scenarioName} setScenarioName={setScName}
            onSave={saveScenario} onOverwrite={overwriteScenario} onRefresh={loadScenarios}
            onRestore={restoreScenario} onDelete={deleteScenario} onRename={renameScenario} onDuplicate={duplicateScenario}
            onPublish={publishScenario} publishedKeys={myPublishedKeys}
            compareIds={compareIds} onToggleCompare={toggleCompare}
            loadedKey={loadedScenarioKey} t={t} isDark={isDark} showSaveForm={true}/>
          <SharedScenarioTable sharedScenarios={sharedScenarios} loading={sharedLoading} shareError={shareError}
            currentUser={currentUser} onRestore={restoreScenario} onUnpublish={unpublishScenario} onDuplicate={duplicatePublishedScenario} onRenameShared={renameSharedScenario}
            onRefresh={loadSharedScenarios} compareIds={compareIds} onToggleCompare={toggleCompare}
            t={t} isDark={isDark}/>
        </div>
      )}
      {pendingCreate&&<CreateDialog pending={pendingCreate} onConfirm={confirmCreate} onCancel={cancelCreate} t={t}/>}
    </div>
  );
}

// ── ControlsBar ───────────────────────────────────────────────────────────────
function ControlsBar({t,isDark,box,btn,inpS,mode,toggleFixed,startDate,handleStartDate,
  sopDate,handleSopDate,gran,setGran,actYrBtn,setDurDays,devDays,mob}){
  const fixStart=mode==="forward"||mode==="both";
  const fixSOP=mode==="backward"||mode==="both";
  return(
    <div style={{...box,padding:mob?"12px 14px":"16px 20px",marginTop:mob?14:undefined}}>
      <div style={{fontSize:13,color:t.textMuted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:0.4}}>Setup</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:mob?"8px 12px":"10px 20px",alignItems:"flex-end"}}>
      <div style={mob?{width:"100%"}:{}}>
        <div style={{fontSize:12,color:t.textMuted,marginBottom:4,fontWeight:600}}>Scheduling Mode <span style={{fontWeight:400}}>(Select One or Both)</span></div>
        <div style={{display:"flex",gap:6}}>
          {[{which:"start",lbl:(fixStart?"📌 ➡️ Fixed":"➡️ Floating")+" Start",active:fixStart},{which:"sop",lbl:(fixSOP?"📌 🎯 Fixed":"🎯 Floating")+" SOP",active:fixSOP}].map(item=>(
            <button key={item.which} onClick={()=>toggleFixed(item.which)}
              style={{padding:"5px 12px",borderRadius:5,border:"1px solid "+(item.active?t.btnAct:t.border),cursor:"pointer",fontSize:13,fontWeight:700,
                background:item.active?t.btnAct:t.btnBg,color:item.active?"#fff":t.btnText,transition:"all 0.15s",
                flex:mob?1:undefined,minWidth:mob?undefined:116,textAlign:"center"}}>
              {item.lbl}
            </button>
          ))}
        </div>
      </div>
      <div style={mob?{width:"calc(50% - 6px)"}:{}}>
        <div style={{fontSize:12,marginBottom:4,fontWeight:600,color:fixStart?"#3a7ad0":t.textMuted}}>
          Start Date <span style={{visibility:fixStart?"visible":"hidden"}}>📌</span>
        </div>
        <DateInput date={startDate} onCommit={handleStartDate} style={{...inpS(!fixStart),width:mob?"100%":undefined}}/>
      </div>
      <div style={mob?{width:"calc(50% - 6px)"}:{}}>
        <div style={{fontSize:12,marginBottom:4,fontWeight:600,color:fixSOP?"#3a7ad0":t.textMuted}}>
          SOP Date (G6) <span style={{visibility:fixSOP?"visible":"hidden"}}>📌</span>
        </div>
        <DateInput date={sopDate} onCommit={handleSopDate} style={{...inpS(!fixSOP),width:mob?"100%":undefined}}/>
      </div>
      <div style={mob?{width:"100%"}:{}}>
        <div style={{fontSize:12,color:t.textMuted,marginBottom:4,fontWeight:600}}>Template Durations</div>
        <div style={{display:"flex",gap:4}}>
          {[1,2,3,4,5].map(y=>(
            <button key={y} onClick={()=>setDurDays(Math.round(365.25*y))} style={{...btn(actYrBtn===y,true),flex:mob?1:undefined}}>{y}yr</button>
          ))}
        </div>
      </div>
      <div style={mob?{width:"100%"}:{}}>
        <div style={{fontSize:12,color:t.textMuted,marginBottom:4,fontWeight:600}}>Timeline Scale</div>
        <div style={{display:"flex",gap:4}}>
          {["Monthly","Quarterly","Yearly"].map(g=>(
            <button key={g} onClick={()=>setGran(g.toLowerCase())} style={{...btn(gran===g.toLowerCase(),true),flex:mob?1:undefined}}>{g}</button>
          ))}
        </div>
      </div>
      {!mob&&<div style={{marginLeft:"auto",textAlign:"right"}}>
        <div style={{fontSize:11,color:t.textMuted}}>Development</div>
        <div style={{fontSize:16,fontWeight:800}}>{fmtW(devDays/7)}</div>
        <div style={{fontSize:10,color:t.textDim}}>SOP: {fmtD(sopDate)}</div>
      </div>}
    </div>
    {mob&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+t.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:11,color:t.textMuted}}>Development</div>
      <div style={{fontSize:15,fontWeight:800}}>{fmtW(devDays/7)}</div>
      <div style={{fontSize:11,color:t.textDim}}>SOP: {fmtD(sopDate)}</div>
    </div>}
    </div>
  );
}

// ── TimelinePanel ─────────────────────────────────────────────────────────────
function TimelinePanel({t,isDark,box,timelineRef,rowLbl,ticks,dspDevFrac,dspLaunchFrac,
  todayDispFrac,showToday,showG7,truncated,startDate,displayEndDate,sopDate,launchEndDate,
  planningEnd,developEnd,n,st,devDays,prodDispItems,dbList,testBars,trVisible,trPos,
  devPhaseDate,devPhaseStart,devPhaseEnd,dspDevPos,getLabelForBar,
  startPhaseDrag,startTrDrag,startBuildDrag,startTestDrag,
  deleteDb,splitDb,deleteTr,deleteTestBar,renameBuildBar,renameTestBar,addBuildBar,addTestBar,
  customTrs,customGates,addCustomTr,addCustomGate,deleteCustomTr,deleteCustomGate,
  renameCustomTr,renameCustomGate,startCustomTrDrag,startCustomGateDrag,
  completed,toggleComplete,hiddenRows,toggleRow,showTodayLine,toggleTodayLine,mob}){
  const legendBg=isDark?"rgba(255,255,255,0.03)":"#f0f2f5";
  const[collapsed,setCollapsed]=useState(false);
  const[containerW,setContainerW]=useState(0);
  useEffect(()=>{
    const el=timelineRef.current;if(!el)return;
    setContainerW(el.getBoundingClientRect().width);
    const ro=new ResizeObserver(es=>setContainerW(es[0].contentRect.width));
    ro.observe(el);return()=>ro.disconnect();
  },[]);
  const DLVL=36,BLVL=BUILD_BAR_H+8;
  // Diamond levels — gates
  const gateItems=[
    ...n.map((_,i)=>({id:"g"+i,x:dspDevFrac*(st[i]+n[i]),label:"G"+i,sub:i===6?"SOP":i===5?"Model Fix":undefined})),
    ...(showG7?[{id:"g7",x:dspDevFrac+dspLaunchFrac,label:"G7"}]:[]),
    ...(customGates||[]).map(g=>({id:"cg"+g.key,x:dspDevPos(g.phase,g.pos),label:g.id}))
  ];
  const gateLvls=resolveDiamondLevels(gateItems,containerW);
  const gateMaxLvl=Math.max(0,...Object.values(gateLvls));
  const gateH=74+gateMaxLvl*DLVL;
  // Diamond levels — tech reviews
  const trItems=[
    ...DEFAULT_TR.map((tr,i)=>trVisible[i]?{id:"tr"+i,x:dspDevPos(tr.phase,trPos[i]),label:tr.id}:null).filter(Boolean),
    ...(customTrs||[]).map(tr=>({id:"ct"+tr.key,x:dspDevPos(tr.phase,tr.pos),label:tr.id}))
  ];
  const trLvls=resolveDiamondLevels(trItems,containerW);
  const trMaxLvl=Math.max(0,...Object.values(trLvls));
  const trH=74+trMaxLvl*DLVL;
  // Bar levels — builds
  const buildItems=(dbList||[]).map(b=>({id:b.key,x1:dspDevPos(b.phase,b.s),x2:dspDevPos(b.phase,b.e)}));
  const buildLvls=resolveBarLevels(buildItems);
  const buildMaxLvl=Math.max(0,...Object.values(buildLvls));
  const buildH=BUILD_BAR_H+28+buildMaxLvl*BLVL;
  // Bar levels — testing
  const testItems=(testBars||[]).map(b=>({id:b.key,x1:dspDevPos(b.phase,b.s),x2:dspDevPos(b.phase,b.e)}));
  const testLvls=resolveBarLevels(testItems);
  const testMaxLvl=Math.max(0,...Object.values(testLvls));
  const testH=BUILD_BAR_H+28+testMaxLvl*BLVL;
  return(
    <div style={{...box,padding:mob?"14px 14px":"20px 22px",minWidth:mob?600:undefined}}>
      <div onClick={()=>setCollapsed(v=>!v)} style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:collapsed?0:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:13,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.4}}>Timeline</div>
          {collapsed&&<span style={{fontSize:11,color:t.textDim,fontStyle:"italic"}}>· Click to expand</span>}
        </div>
        <svg width={14} height={14} viewBox="0 0 14 14" style={{flexShrink:0,transform:collapsed?"rotate(-90deg)":"rotate(0deg)",transition:"transform 0.2s"}}><polyline points="2,5 7,10 12,5" stroke={t.textMuted} strokeWidth={2} fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
      {!collapsed&&<>
      {/* PNG capture target */}
      <div ref={timelineRef} style={{position:"relative",width:"100%",background:isDark?t.bg:"#ffffff",padding:"4px 0"}}>
        {/* Section labels with color accent top-borders + downward bracket ticks */}
        <div style={{display:"flex",height:22,marginBottom:4,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>
          <div style={{position:"relative",width:pc(planningEnd),display:"flex",alignItems:"center",justifyContent:"center",borderRight:"1px solid "+t.border,borderTop:"2px solid rgba(193,78,40,0.75)",overflow:"hidden",flexShrink:0,color:"rgba(193,78,40,0.9)"}}>
            Planning (Ph0–Ph2)
            <div style={{position:"absolute",left:0,top:0,width:2,height:8,background:"rgba(193,78,40,0.75)"}}/>
            <div style={{position:"absolute",right:0,top:0,width:2,height:8,background:"rgba(193,78,40,0.75)"}}/>
          </div>
          <div style={{position:"relative",width:pc(developEnd-planningEnd),display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0,borderRight:"2px dashed "+t.sop,borderTop:"2px solid rgba(20,143,119,0.8)",color:"rgba(20,143,119,0.95)"}}>
            Development (Ph3–Ph6)
            <div style={{position:"absolute",left:0,top:0,width:2,height:8,background:"rgba(20,143,119,0.8)"}}/>
            <div style={{position:"absolute",right:-1,top:0,width:2,height:8,background:"rgba(20,143,119,0.8)"}}/>
          </div>
          <div style={{position:"relative",flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",borderTop:"2px solid rgba(26,82,118,0.7)",color:"rgba(26,82,118,0.9)"}}>
            Production
            <div style={{position:"absolute",left:0,top:0,width:2,height:8,background:"rgba(26,82,118,0.7)"}}/>
            <div style={{position:"absolute",right:0,top:0,width:2,height:8,background:"rgba(26,82,118,0.7)"}}/>
          </div>
        </div>

        {/* Ruler */}
        {(()=>{
          // Prevent Today label from overlapping start/end date text or G6/SOP label
          const nearLeft=todayDispFrac<0.08;
          const nearRight=todayDispFrac>0.92;
          const nearSop=Math.abs(todayDispFrac-dspDevFrac)<0.05;
          const todayLblTx=nearLeft?"translateX(4px)":nearRight?"translateX(calc(-100% - 4px))":nearSop?(todayDispFrac<dspDevFrac?"translateX(calc(-100% - 4px))":"translateX(4px)"):"translateX(-50%)";
          return(
          <div style={{position:"relative",height:48,marginBottom:6}}>
            <div style={{position:"absolute",top:0,left:0,fontSize:12,color:t.rulerMajTx,fontWeight:700,whiteSpace:"nowrap"}}>{fmtD(startDate)}</div>
            <div style={{position:"absolute",top:0,right:0,fontSize:12,color:t.rulerMajTx,fontWeight:700,whiteSpace:"nowrap"}}>
              {fmtD(displayEndDate)}{truncated&&<span style={{fontSize:10,color:t.sop}}> +</span>}
            </div>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:1,background:t.rulerLine}}/>
            {ticks.map((tk,i)=>(
              <div key={i} style={{position:"absolute",left:pc(tk.x),transform:"translateX(-50%)",bottom:0,display:"flex",flexDirection:"column",alignItems:"center",zIndex:1}}>
                {tk.label&&<span style={{fontSize:10,color:tk.major?t.rulerMajTx:t.rulerMinTx,whiteSpace:"nowrap",marginBottom:2,fontWeight:tk.major?700:400}}>{tk.label}</span>}
                <div style={{width:1,height:tk.major?12:6,background:tk.major?t.rulerMajTk:t.rulerMinTk}}/>
              </div>
            ))}
            <div style={{position:"absolute",left:pc(dspDevFrac),top:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",zIndex:6,transform:"translateX(-1px)"}}>
              <span style={{fontSize:11,color:t.sop,whiteSpace:"nowrap",fontWeight:800,position:"absolute",top:0,left:"50%",transform:"translateX(-50%)"}}>G6 / SOP</span>
              <div style={{position:"absolute",bottom:0,width:2,height:16,background:t.sop}}/>
            </div>
            {showToday&&showTodayLine&&(
              <div style={{position:"absolute",left:pc(todayDispFrac),top:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",zIndex:10,transform:"translateX(-1px)"}}>
                <span style={{fontSize:11,color:"#e74c3c",whiteSpace:"nowrap",fontWeight:800,position:"absolute",top:0,left:0,transform:todayLblTx}}>Today</span>
                <div style={{position:"absolute",bottom:0,width:2,height:14,background:"#e74c3c"}}/>
              </div>
            )}
          </div>
          );
        })()}

        {/* Timeline rows */}
        <div style={{position:"relative"}}>
          {/* Gridlines in isolated clipping layer so tooltips can overflow */}
          <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
            {ticks.map((tk,i)=>(
              <div key={"gl-"+i} style={{position:"absolute",left:pc(tk.x),top:0,bottom:0,width:1,background:t.gridLine}}/>
            ))}
            <div style={{position:"absolute",left:pc(dspDevFrac),top:0,bottom:0,width:0,borderLeft:"2px dashed "+t.sop,zIndex:4,transform:"translateX(-1px)"}}/>
            {showToday&&showTodayLine&&<div style={{position:"absolute",left:pc(todayDispFrac),top:0,bottom:0,width:0,borderLeft:"2px dashed rgba(231,76,60,0.8)",zIndex:46,transform:"translateX(-1px)"}}/>}
          </div>

          {/* Phase blocks */}
          <div style={{display:"flex",height:64,position:"relative",overflow:"visible",borderBottom:"1px solid "+t.gridLine}}>
            {n.map((p,i)=>{const phase=PHASES[i];if(!phase)return null;
              const ckey="ph-"+i;
              return(
                <PhaseBlock key={i} phase={phase} idx={i} p={p} dspDevFrac={dspDevFrac} t={t}
                  devPhaseStart={devPhaseStart} devPhaseEnd={devPhaseEnd} devDays={devDays}
                  onDragStart={i<n.length-1?e=>startPhaseDrag(e,i):null}
                  completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>
              );})}
            {prodDispItems.map(item=>(
              <div key={item.ph.id} style={{width:pc(item.w),backgroundColor:item.ph.color,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",borderLeft:"2px solid "+t.bg,overflow:"hidden",flexShrink:0}}>
                <div style={{textAlign:"center",pointerEvents:"none",padding:"0 4px"}}>
                  <div style={{fontSize:item.w>0.07?14:12,fontWeight:800,color:t.phTx,whiteSpace:"nowrap"}}>Ph{item.ph.id}</div>
                  {item.w>0.075&&<div style={{fontSize:11,color:t.phSub,marginTop:1,whiteSpace:"nowrap"}}>{item.ph.name}</div>}
                  {item.w>0.09&&<div style={{fontSize:10,color:t.phDim,marginTop:1}}>{fmtW(item.wks)}</div>}
                </div>
              </div>
            ))}
          </div>

          {/* Phase Exit Gate Reviews */}
          {!hiddenRows.gates&&<div onDoubleClick={addCustomGate} style={{position:"relative",height:gateH,marginTop:2,overflow:"visible",borderBottom:"1px solid "+t.gridLine,cursor:"crosshair"}}>
            <span style={rowLbl}>Phase Exit Gate Reviews</span>
            {n.map((_,i)=>{const x=dspDevFrac*(st[i]+n[i]);const ckey="gate-"+i;return<Diamond key={i} x={x} label={"G"+i}
              sub={i===6?"SOP":i===5?"Model Fix":undefined} color={GATE_COLOR} sz={i===6?15:11}
              tc={t.milTx} sc={t.milSub} date={devPhaseDate(i,1)} desc={GATE_DESC[i]} t={t}
              topOffset={(gateLvls["g"+i]||0)*DLVL}
              completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;}) }
            {showG7&&(()=>{const ckey="gate-7";return<Diamond x={dspDevFrac+dspLaunchFrac} label="G7" color={GATE_COLOR} sz={11} tc={t.milTx} sc={t.milSub} date={launchEndDate} desc={GATE_DESC[7]} t={t} topOffset={(gateLvls["g7"]||0)*DLVL} completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;})()}
            {customGates.map(g=>{const x=dspDevPos(g.phase,g.pos);const ckey="cgate-"+g.key;
              return<Diamond key={"cgate-"+g.key} x={x} label={g.id} color={GATE_COLOR} sz={11}
                tc={t.milTx} sc={t.milSub} date={devPhaseDate(g.phase,g.pos)} t={t}
                onDragStart={e=>startCustomGateDrag(e,g)} onDelete={()=>deleteCustomGate(g.key)}
                onRename={id=>renameCustomGate(g.key,id)}
                topOffset={(gateLvls["cg"+g.key]||0)*DLVL}
                completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;
            })}
          </div>}

          {/* Tech Reviews */}
          {!hiddenRows.reviews&&<div onDoubleClick={addCustomTr} style={{position:"relative",height:trH,marginTop:2,overflow:"visible",borderBottom:"1px solid "+t.gridLine,cursor:"crosshair"}}>
            <span style={rowLbl}>Program Tech Reviews</span>
            {DEFAULT_TR.map((tr,i)=>{if(!trVisible[i])return null;const x=dspDevPos(tr.phase,trPos[i]);const ckey="tr-"+tr.id;
              return<Diamond key={tr.id} x={x} label={tr.id} color={TR_COLOR} sz={12}
                tc={t.milTx} sc={t.milSub} date={devPhaseDate(tr.phase,trPos[i])} desc={tr.desc} t={t}
                onDragStart={e=>startTrDrag(e,i)} onDelete={()=>deleteTr(i)}
                topOffset={(trLvls["tr"+i]||0)*DLVL}
                completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;}) }
            {customTrs.map(tr=>{const x=dspDevPos(tr.phase,tr.pos);const ckey="ctr-"+tr.key;
              return<Diamond key={"ctr-"+tr.key} x={x} label={tr.id} color={TR_COLOR} sz={12}
                tc={t.milTx} sc={t.milSub} date={devPhaseDate(tr.phase,tr.pos)} t={t}
                onDragStart={e=>startCustomTrDrag(e,tr)} onDelete={()=>deleteCustomTr(tr.key)}
                onRename={id=>renameCustomTr(tr.key,id)}
                topOffset={(trLvls["ct"+tr.key]||0)*DLVL}
                completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;
            })}
          </div>}

          {/* Robot Builds */}
          {!hiddenRows.builds&&<div onDoubleClick={addBuildBar} style={{position:"relative",height:buildH,marginTop:2,overflow:"visible",borderBottom:"1px solid "+t.gridLine,cursor:"crosshair"}}>
            <span style={rowLbl}>Robot Builds</span>
            {dbList.map(b=>{const x1=dspDevPos(b.phase,b.s),x2=dspDevPos(b.phase,b.e),lbl=b.label||getLabelForBar(b,dbList);const ckey="build-"+b.key;
              return<DragBar key={b.key} x1={x1} x2={x2} label={lbl}
                dateStart={devPhaseDate(b.phase,b.s)} dateEnd={devPhaseDate(b.phase,b.e)} t={t} isDark={isDark}
                onDragLeft={e=>startBuildDrag(e,b.key,"left",b)}
                onDragRight={e=>startBuildDrag(e,b.key,"right",b)}
                onDragBody={e=>startBuildDrag(e,b.key,"body",b)}
                onDelete={()=>deleteDb(b.key)} onSplit={()=>splitDb(b.key)}
                onRename={label=>renameBuildBar(b.key,label)}
                topOffset={(buildLvls[b.key]||0)*BLVL}
                completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;}) }
          </div>}

          {/* Testing */}
          {!hiddenRows.testing&&<div onDoubleClick={addTestBar} style={{position:"relative",height:testH,marginTop:2,overflow:"visible",cursor:"crosshair"}}>
            <span style={rowLbl}>Testing</span>
            {(testBars||[]).map(b=>{const x1=dspDevPos(b.phase,b.s),x2=dspDevPos(b.phase,b.e);const ckey="test-"+b.key;
              return<DragBar key={b.key} x1={x1} x2={x2} label={b.id}
                dateStart={devPhaseDate(b.phase,b.s)} dateEnd={devPhaseDate(b.phase,b.e)}
                t={t} isDark={isDark} barColor="#5b6abf"
                onDragLeft={e=>startTestDrag(e,b.key,"left",b)}
                onDragRight={e=>startTestDrag(e,b.key,"right",b)}
                onDragBody={e=>startTestDrag(e,b.key,"body",b)}
                onDelete={()=>deleteTestBar(b.key)}
                onRename={label=>renameTestBar(b.key,label)}
                topOffset={(testLvls[b.key]||0)*BLVL}
                completed={!!(completed&&completed[ckey])} onToggleComplete={()=>toggleComplete(ckey)}/>;}) }
          </div>}
        </div>

        {/* Bottom ruler — duplicate scale, labels below ticks */}
        <div style={{position:"relative",height:44,marginTop:2}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:t.rulerLine}}/>
          {ticks.map((tk,i)=>(
            <div key={"br-"+i} style={{position:"absolute",left:pc(tk.x),transform:"translateX(-50%)",top:0,display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:1,height:tk.major?10:5,background:tk.major?t.rulerMajTk:t.rulerMinTk}}/>
              {tk.label&&<span style={{fontSize:10,color:tk.major?t.rulerMajTx:t.rulerMinTx,whiteSpace:"nowrap",marginTop:2,fontWeight:tk.major?700:400}}>{tk.label}</span>}
            </div>
          ))}
          <div style={{position:"absolute",left:pc(dspDevFrac),top:0,width:2,height:10,background:t.sop,zIndex:4,transform:"translateX(-1px)"}}/>
          {showToday&&showTodayLine&&<div style={{position:"absolute",left:pc(todayDispFrac),top:0,width:2,height:10,background:"#e74c3c",zIndex:10,transform:"translateX(-1px)"}}/>}
        </div>

      </div>

      {/* Legend + instructions row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginTop:10,gap:12,flexWrap:"wrap"}}>
        <div style={{position:"relative",border:"1px solid "+t.border,borderRadius:6,padding:"10px 14px 8px",background:legendBg}}>
          <div style={{position:"absolute",top:-9,left:10,padding:"0 5px",background:legendBg,fontSize:10,color:t.textDim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.6px"}}>Legend · Click to show/hide</div>
          <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
            <LegendItem shape="diamond" color={GATE_COLOR} label="Gate Review" tc={t.textMuted} onClick={()=>toggleRow("gates")} hidden={hiddenRows.gates}/>
            <LegendItem shape="diamond" color={TR_COLOR}   label="Tech Review"  tc={t.textMuted} onClick={()=>toggleRow("reviews")} hidden={hiddenRows.reviews}/>
            <LegendItem shape="bar"     color="#b94a08"    label="Robot Build"  tc={t.textMuted} onClick={()=>toggleRow("builds")} hidden={hiddenRows.builds}/>
            <LegendItem shape="bar"     color="#5b6abf"    label="Testing"      tc={t.textMuted} onClick={()=>toggleRow("testing")} hidden={hiddenRows.testing}/>
            {showToday&&<LegendItem shape="bar" color="#e74c3c" label="Today" tc={t.textMuted} onClick={toggleTodayLine} hidden={!showTodayLine}/>}
          </div>
        </div>
        <div style={{position:"relative",border:"1px solid "+t.border,borderRadius:6,padding:"10px 14px 8px",background:legendBg}}>
          <div style={{position:"absolute",top:-9,left:10,padding:"0 5px",background:legendBg,fontSize:10,color:t.textDim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.6px"}}>Tips</div>
          <div style={{fontSize:11,color:t.textMuted,lineHeight:1.7,whiteSpace:"nowrap"}}>
            Drag bars &amp; milestones to reposition · Hover for date info · Right-click element for options · Double-click swimlane to add
          </div>
        </div>
      </div>
      </>}
    </div>
  );
}

// Phase block with hover tooltip + right-click context menu
function PhaseBlock({phase,idx,p,dspDevFrac,t,devPhaseStart,devPhaseEnd,devDays,onDragStart,completed,onToggleComplete}){
  const[hov,setHov]=useState(false);const timer=useRef(null);const showTimer=useRef(null);
  const elemRef=useRef(null);
  const[hovRect,setHovRect]=useState(null);
  const[menuPos,setMenuPos]=useState(null);
  function enter(){clearTimeout(timer.current);clearTimeout(showTimer.current);showTimer.current=setTimeout(()=>{if(elemRef.current)setHovRect(elemRef.current.getBoundingClientRect());setHov(true);},350);}
  function leave(){clearTimeout(showTimer.current);timer.current=setTimeout(()=>setHov(false),150);}
  useEffect(()=>()=>{clearTimeout(timer.current);clearTimeout(showTimer.current);},[]);
  useEffect(()=>{
    if(!hov)return;
    function check(e){
      if(!elemRef.current)return;
      const under=document.elementFromPoint(e.clientX,e.clientY);
      if(!under||!elemRef.current.contains(under)){clearTimeout(showTimer.current);setHov(false);}
    }
    document.addEventListener('mousemove',check);
    return()=>document.removeEventListener('mousemove',check);
  },[hov]);
  const mItem=()=>({fontSize:12,color:t.text,cursor:"pointer",padding:"6px 14px",background:"transparent",border:"none",textAlign:"left",width:"100%",display:"block",whiteSpace:"nowrap",fontWeight:500});
  return(
    <div ref={elemRef}
         style={{width:pc(p*dspDevFrac),backgroundColor:phase.color,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"visible",flexShrink:0,zIndex:hov||menuPos?20:1}}
         onMouseEnter={enter} onMouseLeave={leave}
         onContextMenu={onToggleComplete?e=>{e.preventDefault();e.stopPropagation();setMenuPos({x:e.clientX,y:e.clientY});}:undefined}>
      <div style={{textAlign:"center",pointerEvents:"none",padding:"0 4px",position:"relative",zIndex:2}}>
        <div style={{fontSize:p>0.07?14:12,fontWeight:800,color:t.phTx,whiteSpace:"nowrap"}}>Ph{idx}</div>
        {p>0.075&&<div style={{fontSize:11,color:t.phSub,marginTop:1,whiteSpace:"nowrap"}}>{phase.name}</div>}
        {p>0.09&&<div style={{fontSize:10,color:t.phDim,marginTop:1}}>{fmtW(Math.round(p*devDays/7))}</div>}
      </div>
      {completed&&<div style={{position:"absolute",top:4,right:4,zIndex:30,width:14,height:14,borderRadius:"50%",background:"#27ae60",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.35)"}}>
        <svg width={9} height={9} viewBox="0 0 9 9"><polyline points="1.5,4.5 3.5,6.5 7.5,2" stroke="#fff" strokeWidth={1.8} fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>}
      {onDragStart&&<div onMouseDown={e=>{if(e.button===0)onDragStart(e);}} style={{position:"absolute",right:0,top:0,bottom:0,width:10,cursor:"ew-resize",zIndex:25}}/>}
      {hov&&!menuPos&&<PhaseTooltip phase={phase} idx={idx} startDate={devPhaseStart(idx)} endDate={devPhaseEnd(idx)} pct={p} devDays={devDays} t={t} completed={completed} hasOptions={!!onToggleComplete} anchorRect={hovRect}/>}
      {menuPos&&ReactDOM.createPortal(
        <>
          <div style={{position:"fixed",inset:0,zIndex:1998}} onMouseDown={()=>setMenuPos(null)}/>
          <div style={{position:"fixed",left:Math.min(menuPos.x,window.innerWidth-180),top:Math.min(menuPos.y,window.innerHeight-80),zIndex:1999,background:t.panel,border:"1px solid "+t.border,borderRadius:6,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",minWidth:160,padding:"4px 0",overflow:"hidden"}}>
            <button onMouseDown={e=>{e.stopPropagation();onToggleComplete();setMenuPos(null);}} style={mItem()}>{completed?"✓ Mark Incomplete":"○ Mark Complete"}</button>
          </div>
        </>,
        document.body
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
